<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESIDENTIAL TERMINAL - MILTON v15.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        :root {
            --phosphor: #ffb000; 
            --milton: #e8e8e8;   
            --bg: #0a0600;
            --dim: rgba(255, 176, 0, 0.2);
            --danger: #ff3300;
            --good: #4af626;
            --war: #ff4444;
            --dark: #b366ff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000; font-family: 'VT323', monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; padding: 2vh 2vw; overflow: hidden;
            font-size: 22px; color: var(--phosphor); letter-spacing: 1px;
        }

        .hardware-bezel {
            width: 100%; max-width: 1600px; height: 100%;
            background: #111; border-radius: 12px;
            padding: 20px 20px 90px 20px; 
            box-shadow: inset 0 0 20px #000, 0 0 50px #000;
            display: flex; flex-direction: column; position: relative;
        }

        .crt-screen {
            background: var(--bg); flex-grow: 1; border-radius: 8px;
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            opacity: 0; transition: opacity 0.1s, background-color 0.5s;
        }
        .crt-screen.on { opacity: 1; }
        .crt-screen.war-mode { background: #1a0500; } 
        .crt-screen.dark-mode { background: #0d001a; } 

        .scanlines {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.15) 50%, rgba(0,0,0,0.15));
            background-size: 100% 4px; pointer-events: none; z-index: 50;
        }
        
        .glow {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(255,176,0,0.02) 0%, rgba(0,0,0,0.3) 100%);
            pointer-events: none; z-index: 49;
        }

        .ticker-bar {
            display: flex; background: rgba(255, 176, 0, 0.08);
            border-bottom: 2px solid var(--dim); height: 35px;
            align-items: center; flex-shrink: 0; z-index: 20; position: relative; visibility: hidden;
        }
        .ticker-label {
            background: var(--phosphor); color: #000; font-weight: bold;
            padding: 0 15px; height: 100%; display: flex; align-items: center;
            z-index: 21; box-shadow: 2px 0 10px rgba(0,0,0,0.8);
        }
        .ticker-viewport { flex-grow: 1; overflow: hidden; position: relative; height: 100%; }
        .ticker-scroll {
            position: absolute; white-space: nowrap; line-height: 35px;
            animation: scroll 25s linear infinite; font-size: 20px;
        }
        @keyframes scroll { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        .system-grid {
            display: grid; grid-template-columns: 1fr 430px; 
            flex-grow: 1; position: relative; z-index: 10; overflow: hidden; 
        }

        .terminal-area {
            display: flex; flex-direction: column; padding: 20px 30px 10px 30px; 
            height: 100%; border-right: 2px solid var(--dim); cursor: text; overflow: hidden;
        }

        #artilleryCanvas {
            width: 100%; height: 250px; flex-shrink: 0;
            background: rgba(255, 68, 68, 0.05);
            border: 1px solid var(--war); border-radius: 4px;
            margin-bottom: 15px; display: none;
            box-shadow: inset 0 0 15px rgba(255, 68, 68, 0.2);
        }

        .log-output {
            flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column;
            justify-content: flex-start; padding-bottom: 15px;
        }
        .log-output::-webkit-scrollbar { display: none; }

        /* Crisp text rendering - PURGED GLOW */
        .block { margin-bottom: 15px; line-height: 1.3; text-shadow: none; }
        .block.system { opacity: 0.8; }
        .block.chief { font-weight: bold; color: var(--phosphor); border-left: 3px solid var(--phosphor); padding-left: 15px; }
        .block.milton { color: var(--milton); font-size: 20px; border-left: 3px solid var(--milton); padding-left: 15px; opacity: 0.95; }
        .block.danger { color: var(--danger); font-weight: bold; }
        .block.general { color: var(--war); border-left: 3px solid var(--war); padding-left: 15px; font-weight: bold; }
        .block.dark { color: var(--dark); border-left: 3px solid var(--dark); padding-left: 15px; font-weight: bold; }
        .block.user-echo { font-weight: bold; opacity: 0.9; }

        .input-line {
            display: flex; align-items: center; margin-top: auto;
            flex-shrink: 0; display: none; padding-bottom: 8px; font-size: 24px;
        }
        .prompt { margin-right: 10px; font-weight: bold; }
        #visualInput { white-space: pre; text-transform: lowercase; }
        .cursor {
            display: inline-block; width: 14px; height: 24px; background: var(--phosphor); 
            animation: blink 1s step-end infinite; margin-left: 2px; vertical-align: text-bottom;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        #cmd { position: absolute; opacity: 0; left: -9999px; top: -9999px; pointer-events: none; }

        .dashboard-area {
            padding: 20px; display: flex; flex-direction: column; gap: 12px; 
            background: rgba(10, 6, 0, 0.4); cursor: default; height: 100%; overflow: hidden; visibility: hidden;
        }

        .panel {
            border: 2px solid var(--phosphor); padding: 10px 15px;
            box-shadow: inset 0 0 10px var(--dim); transition: border-color 0.3s; flex-shrink: 0; 
        }
        .panel.war-mode { border-color: var(--war); }
        .panel.dark-mode { border-color: var(--dark); }

        .panel-title { text-align: center; border-bottom: 2px solid var(--dim); padding-bottom: 5px; margin-bottom: 8px; letter-spacing: 2px; font-weight: bold; }
        .metric-header { display: grid; grid-template-columns: 1fr 80px 80px; font-size: 16px; opacity: 0.6; margin-bottom: 5px; text-align: right; border-bottom: 1px solid var(--dim); padding-bottom: 2px; }
        .metric-row { display: grid; grid-template-columns: 1fr 80px 80px; align-items: center; margin-bottom: 6px; cursor: help; }
        .metric-row:hover { background: var(--dim); }
        .metric-label { opacity: 0.8; }
        .metric-value { font-weight: bold; text-align: right; transition: color 0.3s;}
        .metric-target { opacity: 0.5; color: var(--phosphor); text-align: right; font-size: 20px; }
        .metric-value.warning { color: var(--danger); }
        .metric-value.good { color: var(--good); }

        .dict-box {
            flex-grow: 1; border: 1px solid var(--dim); padding: 15px; font-size: 18px; line-height: 1.3; 
            background: rgba(255, 176, 0, 0.05); display: flex; flex-direction: column; overflow-y: auto; min-height: 80px; 
        }
        .dict-box::-webkit-scrollbar { display: none; }
        .context-title { font-weight: bold; font-size: 20px; margin-bottom: 6px; border-bottom: 1px solid var(--phosphor); padding-bottom: 4px; flex-shrink: 0; }
        .context-hist { font-style: italic; opacity: 0.9; border-left: 2px solid var(--phosphor); padding-left: 10px; color: var(--milton); }

        .cmd-list { flex-shrink: 0; font-size: 18px; opacity: 0.9; border-top: 2px dashed var(--dim); padding-top: 10px; padding-bottom: 5px; }
        .cmd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px; }
        .cmd-item { font-size: 18px; }
        .cmd-item.highlight { border: 1px solid var(--milton); color: var(--milton); padding: 2px 4px; border-radius: 3px; text-align: center; margin-bottom: 8px;}

        .hardware-controls { position: absolute; bottom: 22px; right: 35px; display: flex; gap: 25px; z-index: 100; }
        .hw-btn {
            width: 48px; height: 48px; background: #2a2a2a; border: 2px solid #000; border-radius: 50%;
            cursor: pointer; box-shadow: 0 4px 0 #000, inset 0 2px 5px rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; color: #111; 
            transition: all 0.1s; position: relative;
        }
        .hw-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #000; }
        .hw-led { width: 9px; height: 9px; border-radius: 50%; position: absolute; top: -17px; left: 18px; background: #331a00; }
        .hw-led.on { background: #ffaa00; box-shadow: 0 0 10px #ffaa00; }
        .hw-led.green.on { background: #4af626; box-shadow: 0 0 10px #4af626; }
    </style>
</head>
<body>

    <div class="hardware-bezel">
        <div class="crt-screen" id="screen">
            <div class="scanlines"></div><div class="glow"></div>
            
            <div class="ticker-bar" id="tickerBar">
                <div class="ticker-label">NEWSWIRE</div>
                <div class="ticker-viewport">
                    <div class="ticker-scroll" id="tickerContent">AWAITING SYSTEM BOOT...</div>
                </div>
            </div>

            <div class="system-grid">
                <div class="terminal-area" onclick="focusTerminal()">
                    <canvas id="artilleryCanvas"></canvas>
                    <div class="log-output" id="logOutput"></div>
                    <div class="input-line" id="inputLine">
                        <span class="prompt" id="promptText">POTUS:~$</span>
                        <span id="visualInput"></span><div class="cursor" id="cursorIndicator"></div>
                        <input type="text" id="cmd" autocomplete="off" spellcheck="false" maxlength="60">
                    </div>
                </div>

                <div class="dashboard-area" id="dashboardArea">
                    <div class="panel" id="telemetryPanel"></div>
                    <div class="dict-box" id="dictBox">
                        <div class="context-title" id="dictTitle">INTELLIGENCE</div>
                        <div class="context-def" id="dictDef">Hover over metrics to access definitions.</div>
                        <div class="context-hist" id="dictHist" style="display:none;"></div>
                    </div>
                    <div class="cmd-list" id="cmdListArea"></div>
                </div>
            </div>
        </div>

        <div class="hardware-controls">
            <div class="hw-btn" onclick="toggleSound()"><div class="hw-led green on" id="soundLed"></div>🔊</div>
            <div class="hw-btn" onclick="togglePower()"><div class="hw-led" id="powerLed"></div>⏻</div>
        </div>
    </div>

    <script>
        const state = {
            isOn: false, soundEnabled: true,
            mode: 'init', subMode: null, turn: 0, monthsToElection: 48,
            gdp: 2.1, unemployment: 5.1, inflation: 4.8, approval: 48, fedRate: 5.25, fedCred: 80, sp500: 4800, congress: 55, tariff: 0,
            hasPriceControls: false, currentCrisis: '', miltonAskedThisTurn: false,
            warTurnTrigger: 99, 
            war: { enemyStrength: 100, tension: 50, casualties: 0, expenditure: 0 },
            dark: { narrative: 45, compliance: 50, paranoia: 25, trust: 75 },
            newsQueue: [], futureNews: [] 
        };

        const DOM = {
            screen: document.getElementById('screen'), pLed: document.getElementById('powerLed'), sLed: document.getElementById('soundLed'),
            log: document.getElementById('logOutput'), inputLine: document.getElementById('inputLine'), cmd: document.getElementById('cmd'),
            visInput: document.getElementById('visualInput'), dash: document.getElementById('dashboardArea'),
            telemetry: document.getElementById('telemetryPanel'), cmdList: document.getElementById('cmdListArea'),
            dict: document.getElementById('dictBox'), dictTitle: document.getElementById('dictTitle'), dictDef: document.getElementById('dictDef'), dictHist: document.getElementById('dictHist'),
            prompt: document.getElementById('promptText'), tickerBar: document.getElementById('tickerBar'), tickerContent: document.getElementById('tickerContent'),
            canvas: document.getElementById('artilleryCanvas')
        };

        // --- DICTIONARY ---
        const contextDict = {
            'election': { title: "ELECTION COUNTDOWN", def: "The ultimate accountability mechanism.", hist: "Voters almost always punish structural reality if it causes them immediate financial pain." },
            'gdp': { title: "GROSS DOMESTIC PRODUCT", def: "Total economic output. Fails to distinguish between productive capital and wasteful deficit spending.", hist: "Juicing GDP with printed money looks like a boom right before it feels like a bust." },
            'unemployment': { title: "UNEMPLOYMENT RATE", def: "The percentage of the labor force without work. A 'natural rate' exists to allow labor mobility.", hist: "Forcing unemployment to zero artificially guarantees massive inflation." },
            'inflation': { title: "INFLATION (PCE)", def: "Taxation without representation, driven by expanding the money supply.", hist: "Requires brutal, sustained interest rate hikes to break the psychological loop." },
            'sp500': { title: "S&P 500 INDEX", def: "Broad market equity valuation. Highly addicted to cheap debt.", hist: "Wall Street routinely threatens crash scenarios to force the Fed to cut rates." },
            'approval': { title: "APPROVAL RATING", def: "Your political capital.", hist: "Doing the right economic thing usually costs you re-election." },
            'fedRate': { title: "FED FUNDS RATE", def: "The cost of capital. High rates kill inflation but act as monetary gravity on the whole economy.", hist: "Volcker raised this to 20% in 1981 to finally break the back of the Great Inflation." }
        };

        const macroCommands = {
            'rr': { shortcut: 'rr', name: 'RAISE RATES', effect: () => { state.fedRate += 0.75; state.inflation -= 0.6; state.sp500 -= 300; state.gdp -= 0.4; queueNews("[FED WATCH] Chairman announces aggressive rate hike.", 0); } },
            'cr': { shortcut: 'cr', name: 'CUT RATES', effect: () => { state.fedRate = Math.max(0, state.fedRate - 0.75); state.inflation += 0.5; state.sp500 += 400; queueNews("[MARKETS] Fed slashes rates. Easy money returns.", 0); } },
            'cs': { shortcut: 'cs', name: 'CUT SPENDING', effect: () => { state.inflation -= 0.5; state.gdp -= 0.3; state.approval -= 4; state.congress -= 5; queueNews("[POLICY] White House implements austerity measures.", 0); } },
            'is': { shortcut: 'is', name: 'INC SPENDING', effect: () => { state.gdp += 0.4; state.inflation += 0.6; state.approval += 3; state.congress += 6; queueNews("[GOV] Spending bill signed into law.", 0); } },
            'dr': { shortcut: 'dr', name: 'DEREGULATE', effect: () => { state.gdp += 0.5; state.unemployment -= 0.3; state.sp500 += 200; queueNews("[BIZ] Sweeping deregulation enacted across sectors.", 0); } },
            'ft': { shortcut: 'ft', name: 'FREE TRADE', effect: () => { state.tariff = Math.max(0, state.tariff - 5); state.gdp += 0.3; state.inflation -= 0.2; queueNews("[TRADE] Tariffs slashed. Borders open.", 0); } },
            'ta': { shortcut: 'ta', name: 'RAISE TARIFFS', effect: () => { state.tariff += 5; state.inflation += 0.6; state.sp500 -= 200; state.approval += 2; queueNews("[TRADE] Administration enacts sweeping tariffs.", 0); } },
            'pc': { shortcut: 'pc', name: 'PRICE CONTROLS', effect: () => { state.hasPriceControls = true; state.inflation -= 1.5; state.gdp -= 1.2; state.unemployment += 0.8; state.congress -= 8; queueNews("[POLICY] Executive order freezes consumer prices.", 0); } },
            'qe': { shortcut: 'qe', name: 'QUANT EASE', effect: () => { state.sp500 += 600; state.inflation += 2.0; state.fedCred -= 15; queueNews("[FED] Central bank begins massive asset purchases.", 0); } },
            'tx': { shortcut: 'tx', name: 'RAISE TAXES', effect: () => { state.gdp -= 0.7; state.inflation -= 0.4; state.approval -= 6; queueNews("[GOV] Major tax hikes enacted to pay down debt.", 0); } },
            'dm': { shortcut: 'dm', name: 'DEPLOY MILITARY', effect: () => { state.mode = 'war'; triggerWarMode(); } },
            'do': { shortcut: 'do', name: 'DARK OPS', effect: () => { state.mode = 'dark'; triggerDarkMode(); } },
            'am': { shortcut: 'am', name: 'ASK MILTON', effect: () => { state.miltonAsked = true; } },
            'dn': { shortcut: 'dn', name: 'DO NOTHING', effect: () => { state.gdp -= 0.1; } }
        };

        const warCommands = {
            'as': { shortcut: 'as', name: 'ARTILLERY STRIKE', effect: () => { initArtilleryMode(); } },
            'wd': { shortcut: 'wd', name: 'WITHDRAW', effect: () => { endWar(false); } }
        };

        const darkCommands = {
            'ff': { shortcut: 'ff', name: 'FEAR CAMPAIGN', effect: () => { state.dark.narrative += 15; state.dark.paranoia += 20; state.approval += 10; state.dark.trust -= 15; queueNews("[ALERT] Homeland Security raises threat level.", 0); } },
            'ce': { shortcut: 'ce', name: 'CENSOR ENGINE', effect: () => { state.dark.compliance += 20; state.dark.narrative += 10; state.dark.trust -= 15; queueNews("[TECH] Algorithms adjusted for 'platform safety'.", 0); } },
            'ex': { shortcut: 'ex', name: 'EXIT OPS', effect: () => { endDarkOps(); } }
        };

        // --- CRISIS DIALOGUE ---
        const crisisProfiles = {
            'inflation': { 
                chief: "CHIEF OF STAFF: Sir, groceries are up 12%. The base is getting crushed. I strongly advise PRICE CONTROLS [pc]. Think of the second-order effect: we cap the prices, the media praises us for fighting corporate monopolies, and our polling rebounds instantly.", 
                milton: "MILTON: The Chief is confusing optics with economics. If you cap prices, producers will simply stop producing. You aren't eliminating the cost, you are converting it into a time-cost via breadlines and black markets. Restrict the money supply [rr] or [cs]." 
            },
            'unemployment': { 
                chief: "CHIEF OF STAFF: The rust belt is bleeding jobs. Authorize MASSIVE STIMULUS [is] or TARIFFS [ta]. The downstream effect is vital: we save the factories, the local economies stay afloat, and we lock in the blue-collar vote for a generation.", 
                milton: "MILTON: Stimulus is just taking water from the deep end of the pool and pouring it into the shallow end. Tariffs don't protect workers; they subsidize inefficient domestic monopolies by placing a hidden sales tax on 300 million citizens. DEREGULATE [dr]." 
            },
            'stable': {
                chief: "CHIEF OF STAFF: Numbers look fine, but midterms approach. Let's pass a moderate STIMULUS [ms] to pad our margins. It shows we are 'building the future.' We can't afford to just sit here looking idle.",
                milton: "MILTON: The hardest discipline for a politician is knowing when to do absolutely nothing. Meddling just to generate campaign footage breeds crisis later. [dn]"
            }
        };

        // --- AUDIO ENGINE ---
        let audioCtx; let clickBuffer; let humOscillator;
        function initAudio() {
            if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                clickBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
                const data = clickBuffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            } catch (e) { state.soundEnabled = false; DOM.sLed.classList.remove('on'); }
        }
        function playHum() {
            if (!audioCtx || !state.soundEnabled || humOscillator) return;
            humOscillator = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
            humOscillator.type = 'sine'; humOscillator.frequency.value = 60; gainNode.gain.value = 0.01;
            humOscillator.connect(gainNode); gainNode.connect(audioCtx.destination); humOscillator.start();
        }
        function stopHum() { if (humOscillator) { humOscillator.stop(); humOscillator.disconnect(); humOscillator = null; } }
        function playBell(isDark = false) {
            if (!audioCtx || !state.soundEnabled) return;
            const t = audioCtx.currentTime;
            const ping = (time) => {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = isDark ? 'square' : 'sine'; osc.frequency.setValueAtTime(isDark ? 600 : 1200, time);
                osc.frequency.exponentialRampToValueAtTime(isDark ? 400 : 800, time + 0.1);
                gain.gain.setValueAtTime(0.4, time); gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(time); osc.stop(time + 0.15);
            };
            ping(t); ping(t + 0.12);
        }
        function playLaunch() { if(!audioCtx || !state.soundEnabled) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 1.2); gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.2); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 1.2); }
        function playExplosion() { if(!audioCtx || !clickBuffer || !state.soundEnabled) return; const source = audioCtx.createBufferSource(); source.buffer = clickBuffer; const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 800; const gain = audioCtx.createGain(); gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8); source.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); source.start(); source.stop(audioCtx.currentTime + 0.8); }

        // --- TICKER & UI ---
        function queueNews(msg, delay) { if (delay === 0) state.newsQueue.push(msg); else state.futureNews.push({ turn: state.turn + delay, msg }); }
        
        function processTicker() {
            state.futureNews = state.futureNews.filter(e => { if (e.turn <= state.turn) { state.newsQueue.push(e.msg); return false; } return true; });
            let news = state.newsQueue.length ? state.newsQueue : ["[SYSTEM] ALL METRICS NOMINAL."];
            DOM.tickerContent.innerHTML = news.join(" &nbsp;&nbsp; // &nbsp;&nbsp; ");
            if (DOM.tickerContent.dataset.lastUpdate !== state.turn.toString()) {
                DOM.tickerContent.style.animation = 'none'; void DOM.tickerContent.offsetWidth;
                DOM.tickerContent.style.animation = null; DOM.tickerContent.dataset.lastUpdate = state.turn.toString();
            }
            state.newsQueue = []; 
        }

        function renderMacroDashboard() {
            DOM.telemetry.className = 'panel'; DOM.screen.className = 'crt-screen on'; DOM.prompt.textContent = "POTUS:~$";
            const gdpClass = state.gdp >= 3 ? 'good' : (state.gdp < 1 ? 'warning' : '');
            const infClass = state.inflation <= 2.5 ? 'good' : (state.inflation > 5 ? 'warning' : '');
            
            DOM.telemetry.innerHTML = `
                <div class="panel-title">MACRO TELEMETRY</div>
                <div class="metric-header"><span>METRIC</span><span>ACTUAL</span><span>TGT</span></div>
                <div class="metric-row" onmouseover="setDict('election')"><span class="metric-label">MTHS TO ELECTION:</span><span class="metric-value ${state.monthsToElection<=12?'warning':''}">${state.monthsToElection}</span><span class="metric-target">--</span></div>
                <div style="height:1px; border-bottom: 1px dashed var(--dim); margin-bottom: 6px;"></div>
                <div class="metric-row" onmouseover="setDict('gdp')"><span class="metric-label">GDP GROWTH:</span><span class="metric-value ${gdpClass}">${state.gdp}%</span><span class="metric-target">3.0%</span></div>
                <div class="metric-row" onmouseover="setDict('inflation')"><span class="metric-label">INFLATION:</span><span class="metric-value ${infClass}">${state.inflation}%</span><span class="metric-target">2.0%</span></div>
                <div class="metric-row" onmouseover="setDict('fedRate')"><span class="metric-label">INT RATE:</span><span class="metric-value">${state.fedRate}%</span><span class="metric-target">--</span></div>
                <div class="metric-row" onmouseover="setDict('sp500')"><span class="metric-label">S&P 500:</span><span class="metric-value">${Math.round(state.sp500)}</span><span class="metric-target">5200</span></div>
                <div style="height:6px;"></div>
                <div class="metric-row" onmouseover="setDict('approval')"><span class="metric-label">APP RATING:</span><span class="metric-value">${Math.round(state.approval)}%</span><span class="metric-target">51%</span></div>
            `;
            DOM.cmdList.innerHTML = `
                <div class="cmd-grid">
                    <div>[rr] Raise Rate</div><div>[cs] Cut Spend</div>
                    <div>[cr] Cut Rate</div><div>[is] Inc Spend</div>
                    <div>[tx] Raise Tax</div><div>[dr] Dereg</div>
                    <div style="color:var(--dark)">[do] Dark Ops</div><div style="color:var(--war)">[dm] Military</div>
                </div>
                <div class="cmd-item highlight" style="margin-top:8px" onclick="DOM.cmd.value='am';processInput()">[am] ASK MILTON</div>
            `;
        }

        function setDict(key) {
            const d = contextDict[key];
            if(d) { DOM.dictTitle.textContent = d.title; DOM.dictDef.textContent = d.def; DOM.dictHist.style.display = 'block'; DOM.dictHist.textContent = "PRECEDENT: " + d.hist; }
        }

        // --- ARTILLERY SUB-MODULE ---
        let artCtx; let artLoopId;
        const artState = { pX: 30, groundY: 220, targetX: 0, proj: null };

        function initArtilleryMode() {
            state.subMode = 'artillery'; DOM.canvas.style.display = 'block';
            DOM.canvas.width = DOM.canvas.clientWidth || 400; DOM.canvas.height = 250;
            artCtx = DOM.canvas.getContext('2d');
            let safeW = DOM.canvas.width;
            artState.targetX = Math.max(150, Math.min(safeW - 100, Math.random() * (safeW - 250) + 150));
            renderWarDashboard(); drawArtilleryBase();
            print("SYSTEM: ARTILLERY TARGETING ACTIVE. INPUT ANGLE AND YIELD.", 'danger');
            setTimeout(enableInput, 100); 
        }

        function drawArtilleryBase() {
            if (!artCtx) return;
            artCtx.clearRect(0,0, DOM.canvas.width, DOM.canvas.height);
            artCtx.strokeStyle = 'rgba(255,176,0,0.5)'; artCtx.beginPath(); artCtx.moveTo(0, artState.groundY); artCtx.lineTo(DOM.canvas.width, artState.groundY); artCtx.stroke();
            artCtx.fillStyle = '#4af626'; artCtx.fillRect(artState.pX, artState.groundY - 15, 20, 15);
            artCtx.fillStyle = '#ff4444'; artCtx.fillRect(artState.targetX, artState.groundY - 15, 30, 15);
        }

        function fireArtillery(angle, pYield) {
            playLaunch(); state.war.expenditure += 15; 
            print("[WAR EXPENDITURE DEBITED: $15 BILLION]", 'danger');
            const v = pYield * 0.25; const rad = angle * Math.PI / 180;
            artState.proj = { x: artState.pX + 10, y: artState.groundY - 15, vx: v * Math.cos(rad), vy: v * Math.sin(rad), active: true, isPlayer: true };
            animateProjectile();
        }

        function animateProjectile() {
            if (!artCtx || !artState.proj.active) return;
            artState.proj.x += artState.proj.vx; artState.proj.y -= artState.proj.vy; artState.proj.vy -= 0.5; 
            drawArtilleryBase();
            artCtx.fillStyle = artState.proj.isPlayer ? '#ffb000' : '#ff4444';
            artCtx.beginPath(); artCtx.arc(artState.proj.x, artState.proj.y, 3, 0, Math.PI*2); artCtx.fill();
            if (artState.proj.y >= artState.groundY) { artState.proj.active = false; handleImpact(); } 
            else { artLoopId = requestAnimationFrame(animateProjectile); }
        }

        function handleImpact() {
            playExplosion(); if (!artCtx) return;
            if (artState.proj.isPlayer) {
                let dist = Math.abs(artState.proj.x - (artState.targetX + 15));
                if (dist < 25) { print("GENERAL: DIRECT HIT!", 'good'); state.war.enemyStrength -= 35; } 
                else { print("GENERAL: MISS. Ordnance fell short.", 'danger'); }
                if (state.war.enemyStrength <= 0) { setTimeout(()=>endWar(true), 1500); return; }
                setTimeout(enemyFire, 1000);
            } else {
                let dist = Math.abs(artState.proj.x - (artState.pX + 10));
                if (dist < 30) { print("GENERAL: BASE HIT! Casualties reported.", 'danger'); state.war.casualties += 40; state.approval -= 5; }
                updateDashboard(); setTimeout(enableInput, 500);
            }
        }

        function enemyFire() {
            print("GENERAL: INCOMING!", 'danger'); playLaunch();
            const d = (artState.targetX + 15) - (artState.pX + 10);
            let vReq = Math.sqrt(d * 0.5); vReq += (Math.random() - 0.5) * 5; 
            const rad = 135 * Math.PI / 180; 
            artState.proj = { x: artState.targetX, y: artState.groundY - 15, vx: vReq * Math.cos(rad), vy: vReq * Math.sin(rad), active: true, isPlayer: false };
            animateProjectile();
        }

        // --- SYSTEM CORE ---
        function togglePower() {
            if (state.isOn) { location.reload(); return; }
            state.isOn = true; DOM.pLed.classList.add('on'); DOM.screen.classList.add('on');
            initAudio(); playHum(); playBell();
            setTimeout(startBriefing, 800);
        }

        function startBriefing() {
            state.mode = 'init';
            state.gdp = (Math.random() * 4 - 1).toFixed(1);
            state.inflation = (Math.random() * 6 + 2).toFixed(1);
            state.warTurnTrigger = Math.floor(Math.random() * 5) + 3;
            print("INCOMING BRIEFING: THE PREDECESSOR'S LEGACY");
            print("--------------------------------------------------");
            print(`Inherited Inflation: ${state.inflation}% | Inherited Growth: ${state.gdp}%`);
            print(`Months to Election: 48 | Current Fed Rate: ${state.fedRate}%`);
            print("--------------------------------------------------");
            print("FIRST ACTION: ENTER INITIAL POLICY PACKAGE (e.g., rr, cs, dr)");
            DOM.inputLine.style.display = 'flex'; focusTerminal();
        }

        function advanceTimeline() {
            state.turn++; state.monthsToElection -= 4;
            if (state.monthsToElection <= 0) { print("ELECTION DAY: GAME OVER."); return; }
            
            // Monetary Gravity
            if (state.fedRate > 6.5) { state.gdp -= 0.3; state.sp500 -= 80; }
            if (state.inflation <= 2.5 && state.unemployment <= 5.0) state.gdp += 0.2;

            if (state.turn === state.warTurnTrigger) { state.mode = 'war'; triggerWarMode(); return; }

            updateDashboard(); processTicker();
            print(`\n--- MONTH ${48 - state.monthsToElection} ---`);
            const crisis = crisisProfiles[state.inflation > 5 ? 'inflation' : 'stable'];
            print(crisis.chief, 'chief');
            enableInput();
        }

        function processInput() {
            let rawVal = DOM.cmd.value.trim().toLowerCase(); DOM.cmd.value = ''; DOM.visInput.textContent = '';
            if (!rawVal) return;

            if (state.subMode === 'artillery') {
                let parts = rawVal.replace(/,/g, ' ').split(/\s+/).filter(t => t);
                let angle = parseFloat(parts[0]); let pYield = parseFloat(parts[1]);
                if (isNaN(angle) || isNaN(pYield)) { print("SYSTEM: INVALID SOLUTION.", 'danger'); enableInput(); return; }
                fireArtillery(angle, pYield); return;
            }

            if (rawVal === 'am' || rawVal === 'ask milton') {
                print("POTUS:~$ ASK MILTON", 'user-echo');
                print(crisisProfiles[state.inflation > 5 ? 'inflation' : 'stable'].milton, 'milton');
                enableInput(); return;
            }

            let initialMode = state.mode;
            let dict = state.mode === 'war' ? warCommands : (state.mode === 'dark' ? darkCommands : macroCommands);
            let tokens = rawVal.replace(/ and /g, ',').split(',').map(t => t.trim()).filter(t => dict[t]);
            
            if (!tokens.length) { print("SYSTEM: UNRECOGNIZED DIRECTIVE.", 'danger'); enableInput(); return; }
            tokens.forEach(t => dict[t].effect());
            
            if (state.mode === 'init') state.mode = 'macro';
            if (state.mode === initialMode) setTimeout(advanceTimeline, 800); else setTimeout(enableInput, 800);
        }

        function focusTerminal() { DOM.cmd.focus(); }
        function toggleSound() { state.soundEnabled = !state.soundEnabled; DOM.sLed.classList.toggle('on'); if(!state.soundEnabled) stopHum(); else playHum(); }
        DOM.cmd.addEventListener('input', (e) => { DOM.visInput.textContent = e.target.value; });
        DOM.cmd.addEventListener('keydown', (e) => { if (e.key === 'Enter') processInput(); if (e.key.length === 1) playClick(); });
        document.getElementById('powerLed').parentElement.onclick = togglePower;
    </script>
</body>
</html>
