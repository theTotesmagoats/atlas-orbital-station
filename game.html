<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESIDENTIAL TERMINAL - MILTON v9.5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        :root {
            --phosphor: #ffb000; 
            --milton: #e8e8e8;   
            --bg: #0a0600;
            --dim: rgba(255, 176, 0, 0.3);
            --danger: #ff3300;
            --war: #ff4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 2vh 2vw;
            overflow: hidden;
            font-size: 22px; 
            color: var(--phosphor);
            letter-spacing: 1px;
        }

        .hardware-bezel {
            width: 100%;
            max-width: 1600px;
            height: 100%;
            background: #111;
            border-radius: 12px;
            padding: 20px 20px 90px 20px; 
            box-shadow: inset 0 0 20px #000, 0 0 50px #000;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .crt-screen {
            background: var(--bg);
            flex-grow: 1;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            display: flex;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            opacity: 0; 
            transition: opacity 0.1s, background-color 0.5s;
        }
        .crt-screen.on { opacity: 1; }
        .crt-screen.war-mode { background: #1a0500; } 

        .scanlines {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.15) 50%, rgba(0,0,0,0.15));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 50;
        }
        
        .glow {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(255,176,0,0.02) 0%, rgba(0,0,0,0.3) 100%);
            pointer-events: none;
            z-index: 49;
        }

        .system-grid {
            display: grid;
            grid-template-columns: 1fr 410px;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 10;
            overflow: hidden; 
        }

        .terminal-area {
            display: flex;
            flex-direction: column;
            padding: 25px 30px 10px 30px;
            height: 100%;
            border-right: 2px solid var(--dim);
            cursor: text; 
            overflow: hidden;
        }

        .log-output {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-bottom: 15px;
        }
        .log-output::-webkit-scrollbar { display: none; }
        .log-output { -ms-overflow-style: none; scrollbar-width: none; }

        .block { margin-bottom: 15px; line-height: 1.3; white-space: pre-wrap; text-shadow: 0 0 2px var(--phosphor); }
        .block.system { opacity: 0.8; }
        .block.chief { font-weight: bold; color: var(--phosphor); border-left: 3px solid var(--phosphor); padding-left: 15px; }
        .block.milton { color: var(--milton); font-size: 20px; border-left: 3px solid var(--milton); padding-left: 15px; text-shadow: 0 0 2px var(--milton); opacity: 0.95; }
        .block.danger { color: var(--danger); text-shadow: 0 0 3px var(--danger); font-weight: bold; }
        .block.general { color: var(--war); text-shadow: 0 0 3px var(--war); border-left: 3px solid var(--war); padding-left: 15px; font-weight: bold; }
        .block.user-echo { font-weight: bold; opacity: 0.9; }

        .input-line {
            display: flex;
            align-items: center;
            margin-top: auto;
            flex-shrink: 0;
            display: none; 
            padding-bottom: 8px; 
            font-size: 24px;
        }

        .prompt { margin-right: 10px; text-shadow: 0 0 2px var(--phosphor); font-weight: bold; }
        #visualInput { white-space: pre; text-transform: lowercase; text-shadow: 0 0 2px var(--phosphor); }

        .cursor {
            display: inline-block; width: 14px; height: 24px;
            background: var(--phosphor); animation: blink 1s step-end infinite;
            margin-left: 2px; vertical-align: text-bottom; box-shadow: 0 0 3px var(--phosphor);
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        #cmd { position: absolute; opacity: 0; left: -9999px; top: -9999px; pointer-events: none; }

        .dashboard-area {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px; 
            background: rgba(10, 6, 0, 0.4);
            cursor: default;
            height: 100%;
            overflow: hidden; 
        }

        .panel {
            border: 2px solid var(--phosphor);
            padding: 10px 15px;
            box-shadow: inset 0 0 10px var(--dim);
            transition: border-color 0.3s;
            flex-shrink: 0; 
        }
        .panel.war-mode { border-color: var(--war); box-shadow: inset 0 0 20px rgba(255, 68, 68, 0.2); }

        .panel-title {
            text-align: center; border-bottom: 2px solid var(--dim);
            padding-bottom: 5px; margin-bottom: 8px; letter-spacing: 2px; font-weight: bold;
        }

        .metric-row { display: flex; justify-content: space-between; margin-bottom: 6px; cursor: help; }
        .metric-row:hover { background: var(--dim); }
        .metric-label { opacity: 0.8; text-shadow: 0 0 1px var(--phosphor); }
        .metric-value { font-weight: bold; text-shadow: 0 0 2px var(--phosphor); }
        .metric-value.warning { color: var(--danger); text-shadow: 0 0 3px var(--danger); }
        .metric-value.good { color: #4af626; text-shadow: 0 0 2px #4af626; }

        .dict-box {
            flex-grow: 1; 
            border: 1px solid var(--dim); padding: 15px;
            font-size: 18px; line-height: 1.3; background: rgba(255, 176, 0, 0.05);
            display: flex; flex-direction: column;
            overflow-y: auto; 
            min-height: 80px; 
        }
        .dict-box::-webkit-scrollbar { display: none; }
        
        .context-title {
            font-weight: bold; font-size: 20px; margin-bottom: 6px;
            border-bottom: 1px solid var(--phosphor); padding-bottom: 4px;
            text-shadow: 0 0 1px var(--phosphor);
            flex-shrink: 0;
        }
        .context-def { margin-bottom: 8px; text-shadow: 0 0 1px var(--phosphor); }
        .context-hist { font-style: italic; opacity: 0.9; border-left: 2px solid var(--phosphor); padding-left: 10px; text-shadow: 0 0 1px var(--phosphor); color: var(--milton); }

        .cmd-list {
            flex-shrink: 0; 
            font-size: 18px; opacity: 0.9;
            border-top: 2px dashed var(--dim); padding-top: 10px; text-shadow: 0 0 1px var(--phosphor);
            padding-bottom: 5px; 
        }
        .cmd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px; }
        .cmd-item { font-size: 18px; }
        .cmd-item.highlight { border: 1px solid var(--milton); color: var(--milton); padding: 2px 4px; border-radius: 3px; text-shadow: none; text-align: center; margin-bottom: 8px;}
        .cmd-item.war-highlight { border: 1px solid var(--war); color: var(--war); text-shadow: none; text-align: center;}

        .hardware-controls { 
            position: absolute; 
            bottom: 22px; 
            right: 35px; 
            display: flex; 
            gap: 25px; 
            z-index: 100; 
        }
        
        .hw-btn {
            width: 48px; height: 48px; background: #2a2a2a; border: 2px solid #000; border-radius: 50%;
            cursor: pointer; box-shadow: 0 4px 0 #000, inset 0 2px 5px rgba(255,255,255,0.1);
            display: flex; justify-content: center; align-items: center; color: #111; 
            font-family: sans-serif; text-shadow: 1px 1px 0 rgba(255,255,255,0.15); transition: all 0.1s; position: relative;
        }
        .hw-btn:hover { background: #333; }
        .hw-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #000, inset 0 2px 5px rgba(255,255,255,0.1); }
        .hw-icon { font-size: 20px; } .hw-icon.power { font-size: 24px; }
        
        .hw-led {
            width: 9px; height: 9px; border-radius: 50%; position: absolute; top: -17px; left: 18px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
        }
        .hw-led.amber { background: #331a00; } .hw-led.amber.on { background: #ffaa00; box-shadow: 0 0 10px #ffaa00, inset 0 1px 2px rgba(255,255,255,0.5); }
        .hw-led.green { background: #003300; } .hw-led.green.on { background: #4af626; box-shadow: 0 0 10px #4af626, inset 0 1px 2px rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <div class="hardware-bezel">
        <div class="crt-screen" id="screen">
            <div class="scanlines"></div>
            <div class="glow"></div>
            
            <div class="system-grid">
                
                <div class="terminal-area" onclick="focusTerminal()">
                    <div class="log-output" id="logOutput"></div>
                    
                    <div class="input-line" id="inputLine">
                        <span class="prompt" id="promptText">POTUS:~$</span>
                        <span id="visualInput"></span><div class="cursor" id="cursorIndicator"></div>
                        <input type="text" id="cmd" autocomplete="off" spellcheck="false" maxlength="50">
                    </div>
                </div>

                <div class="dashboard-area" id="dashboardArea" style="visibility:hidden;">
                    <div class="panel" id="telemetryPanel"></div>

                    <div class="dict-box" id="dictBox">
                        <div class="context-title">INTELLIGENCE</div>
                        <div class="context-def">Hover over metrics to access structural definitions and precedents.</div>
                    </div>

                    <div class="cmd-list" id="cmdListArea"></div>
                </div>

            </div>
        </div>

        <div class="hardware-controls">
            <div class="hw-btn" onclick="toggleSound()" title="TOGGLE SOUND">
                <div class="hw-led green on" id="soundLed"></div><div class="hw-icon">🔊</div>
            </div>
            <div class="hw-btn" onclick="togglePower()" title="POWER">
                <div class="hw-led amber" id="powerLed"></div><div class="hw-icon power">⏻</div>
            </div>
        </div>
    </div>

    <script>
        // --- CORE STATE ---
        const state = {
            isOn: false, soundEnabled: true,
            mode: 'macro', turn: 1, maxTurns: 12, monthsToElection: 48,
            gdp: 2.1, unemployment: 5.1, inflation: 4.8, approval: 48, fedCredibility: 80, sp500: 4800, congress: 55, tariffRate: 5.0,
            hasPriceControls: false, currentCrisis: '', miltonAskedThisTurn: false,
            war: { enemyStrength: 100, tension: 50, casualties: 0, expenditure: 0, active: false }
        };

        const DOM = {
            screen: document.getElementById('screen'), pLed: document.getElementById('powerLed'), sLed: document.getElementById('soundLed'),
            log: document.getElementById('logOutput'), inputLine: document.getElementById('inputLine'), cmd: document.getElementById('cmd'),
            visInput: document.getElementById('visualInput'), dash: document.getElementById('dashboardArea'),
            telemetry: document.getElementById('telemetryPanel'), cmdList: document.getElementById('cmdListArea'),
            dict: document.getElementById('dictBox'), prompt: document.getElementById('promptText')
        };

        // --- DICTIONARY ---
        const contextDict = {
            'election': { title: "ELECTION COUNTDOWN", def: "The ultimate accountability mechanism.", hist: "Voters almost always punish structural reality if it causes them immediate financial pain at the grocery store." },
            'gdp': { title: "GROSS DOMESTIC PRODUCT", def: "A measure of total economic output. However, it fails to distinguish between productive capital investment and wasteful government deficit spending.", hist: "Juicing GDP with printed money always looks like a boom right before it feels like a bust." },
            'unemployment': { title: "UNEMPLOYMENT RATE", def: "The percentage of the labor force without work. A 'natural rate' exists to allow labor to move to where it is most needed.", hist: "The Phillips Curve tradeoff is an illusion. Trying to artificially force unemployment to zero via stimulus guarantees runaway inflation." },
            'inflation': { title: "INFLATION (PCE)", def: "Inflation is always and everywhere a monetary phenomenon. It is taxation without representation, driven by expanding the money supply.", hist: "It requires brutal, sustained interest rate hikes to break the psychological loop of inflation once it begins." },
            'sp500': { title: "S&P 500 INDEX", def: "Broad market equity valuation. Highly addicted to cheap debt and quantitative easing.", hist: "Wall Street routinely threatens crash scenarios to force the Federal Reserve to capitulate and cut rates." },
            'approval': { title: "APPROVAL RATING", def: "Your political capital. Taking necessary economic medicine drops this immediately, but maintaining structural stability recovers it over time.", hist: "Doing the right economic thing usually costs you re-election. Doing the wrong thing guarantees a crisis for your successor." },
            'congress': { title: "CONGRESSIONAL APP", def: "Legislative tolerance.", hist: "If this drops below 15%, impeachment proceedings become a mathematical certainty regardless of partisan loyalty." },
            'fed': { title: "FED CREDIBILITY", def: "The market's belief that the central bank will act independently to maintain price stability, even when the President begs them not to.", hist: "Arthur Burns famously capitulated to President Nixon's demands for low rates prior to the 1972 election, sparking a decade of stagflation." },
            'tariffs': { title: "AVERAGE TARIFF RATE", def: "A direct tax levied on your own domestic consumers under the guise of punishing foreigners.", hist: "The Smoot-Hawley Tariff Act of 1930 drastically worsened the Great Depression by triggering a catastrophic global trade war." },
            'strength': { title: "ENEMY STRENGTH", def: "Remaining combat capacity of the hostile force.", hist: "Reaching 0% signifies theater victory and forces capitulation." },
            'tension': { title: "THEATER TENSION", def: "The likelihood of a global escalation or nuclear exchange.", hist: "Reaching 100% triggers Mutually Assured Destruction. The ultimate failure of diplomacy." },
            'casualties': { title: "CASUALTIES", def: "American lives lost. Drags heavily and permanently on domestic approval.", hist: "Prolonged kinetic engagements with mounting body counts reliably destroy incumbent administrations." },
            'expenditure': { title: "WAR EXPENDITURE", def: "Billions of dollars burned in the theater. Will hit the macro economy upon return.", hist: "War is the ultimate destroyer of economic capital. The bills always come due on the home front." }
        };

        // --- COMMANDS ---
        const macroCommands = {
            'rr': { shortcut: 'rr', name: 'RAISE RATES', effect: () => { state.gdp-=0.6; state.inflation-=0.8; state.unemployment+=0.5; state.sp500-=300; state.fedCredibility+=5; state.approval-=3; state.congress+=2; } },
            'cr': { shortcut: 'cr', name: 'CUT RATES', effect: () => { state.gdp+=0.5; state.inflation+=0.7; state.unemployment-=0.3; state.sp500+=400; state.fedCredibility-=6; state.approval+=3; } },
            'is': { shortcut: 'is', name: 'INCREASE SPENDING', effect: () => { state.gdp+=0.4; state.inflation+=0.5; state.unemployment-=0.2; state.sp500+=150; state.approval+=2; state.congress+=5; } },
            'cs': { shortcut: 'cs', name: 'CUT SPENDING', effect: () => { state.gdp-=0.4; state.inflation-=0.3; state.unemployment+=0.3; state.sp500-=100; state.approval-=4; state.congress-=5; } },
            'ms': { shortcut: 'ms', name: 'MASSIVE STIMULUS', effect: () => { state.gdp+=0.8; state.inflation+=1.5; state.unemployment-=0.6; state.sp500+=600; state.fedCredibility-=10; state.approval+=5; state.congress+=10; } },
            'dr': { shortcut: 'dr', name: 'DEREGULATE', effect: () => { state.gdp+=0.3; state.inflation-=0.1; state.unemployment-=0.2; state.sp500+=200; state.approval+=1; state.congress-=2; } },
            'ta': { shortcut: 'ta', name: 'RAISE TARIFFS', effect: () => { state.tariffRate+=5.0; state.sp500-=250; state.congress+=2; } },
            'ft': { shortcut: 'ft', name: 'FREE TRADE', effect: () => { state.tariffRate=Math.max(0, state.tariffRate-5.0); state.sp500+=150; state.gdp+=0.2; } },
            'pc': { shortcut: 'pc', name: 'PRICE CONTROLS', effect: () => { state.inflation-=1.5; state.gdp-=1.2; state.sp500-=500; state.unemployment+=0.8; state.hasPriceControls=true; state.congress-=10; } },
            'dn': { shortcut: 'dn', name: 'DO NOTHING', effect: () => { state.gdp-=0.1; state.inflation-=0.2; state.sp500+=50; } },
            'ng': { shortcut: 'ng', name: 'NEGOTIATE', effect: () => { state.sp500+=400; state.inflation-=1.0; state.approval-=5; state.congress-=8; } },
            'dm': { shortcut: 'dm', name: 'DEPLOY MILITARY', effect: () => { triggerWarMode(); } }
        };

        const warCommands = {
            'as': { shortcut: 'as', name: 'AIRSTRIKE', effect: () => { state.war.enemyStrength-=20; state.war.expenditure+=15; state.war.tension+=10; } },
            'bd': { shortcut: 'bd', name: 'BLOCKADE', effect: () => { state.war.enemyStrength-=10; state.war.tension-=5; state.war.expenditure+=5; state.inflation+=1.0; } },
            'go': { shortcut: 'go', name: 'GROUND OPS', effect: () => { state.war.enemyStrength-=35; state.war.casualties+=150; state.war.expenditure+=25; state.war.tension+=20; state.approval-=5; } },
            'so': { shortcut: 'so', name: 'SPECIAL OPS', effect: () => { 
                if(Math.random() > 0.4) { state.war.enemyStrength-=15; state.war.expenditure+=2; print("GENERAL: Surgical strike successful. HVT eliminated.", 'general'); } 
                else { state.war.casualties+=25; state.war.tension+=15; state.approval-=3; print("GENERAL: Mission compromised! We lost a squad. The press is all over this.", 'danger'); }
            } },
            'es': { shortcut: 'es', name: 'ESCALATE (SURGE)', effect: () => { state.war.enemyStrength-=50; state.war.casualties+=400; state.war.expenditure+=50; state.war.tension+=40; state.approval-=12; } },
            'wd': { shortcut: 'wd', name: 'WITHDRAW', effect: () => { endWar(false); } }
        };

        const crisisProfiles = {
            'inflation': {
                chief: "CHIEF OF STAFF: Mr. President, inflation is killing us in the polls. Working families can't afford groceries. I strongly advise we implement PRICE CONTROLS [pc] to stop corporate price-gouging immediately!",
                milton: "MILTON: Mr. President, if you put a cap on the price of bread, you don't make bread cheaper—you just make it disappear. Price controls destroy the signaling mechanism of the free market. You will cure high prices with empty supermarket shelves and black markets. To fix inflation, restrict the money supply. Raise rates [rr] or cut spending [cs], regardless of the political cost."
            },
            'unemployment': {
                chief: "CHIEF OF STAFF: Sir, the rust belt is bleeding jobs. Union leaders are threatening to walk. Authorize a MASSIVE STIMULUS [ms] or slap TARIFFS [ta] on imports right now to protect American labor!",
                milton: "MILTON: Ah, yes. The classic 'buy their love with their own money' strategy. You can juice the GDP today with stimulus, but when that newly printed money chases the exact same amount of goods next year, inflation will eat your approval ratings alive. Tariffs just secretly tax 300 million Americans at the register to protect a few thousand inefficient jobs. Let the market clear [dr]."
            },
            'market_crash': {
                chief: "CHIEF OF STAFF: The S&P is in freefall! Our mega-donors are losing billions! Wall Street is threatening to pull all funding. Demand the Fed CUT RATES [cr] right this second before we lose the election!",
                milton: "MILTON: The infamous 'Fed Put.' The market threw a tantrum because they over-leveraged on cheap debt, and now the Chief wants to hand them a taxpayer-funded bailout lollipop. Capitalism without bankruptcy is like religion without hell. If you rescue Wall Street every time they gamble poorly, they will never learn risk management. Let them take the loss [dn]."
            },
            'geopolitical': {
                chief: "CHIEF OF STAFF: Sir, the Strait of Hormuz is blockaded. Oil prices are spiking. We look incredibly weak on the world stage. The General wants to DEPLOY MILITARY [dm], but we could try to NEGOTIATE [ng].",
                milton: "MILTON: War is the ultimate inflationary engine, Mr. President. You are paying citizens to build complex machines whose sole purpose is to be blown up. It destroys capital and spikes the deficit. A diplomatic solution [ng] avoids the deadweight loss of kinetic action, though I concede it may bruise your political ego."
            },
            'stable': {
                chief: "CHIEF OF STAFF: Sir, the numbers look okay, but the midterms are approaching. We can't afford to look asleep at the wheel. Let's pass a moderate stimulus [ms] just to pad our margins and give the voters a win.",
                milton: "MILTON: The hardest thing for a politician to do is to sit on his hands. The economy is currently breathing on its own. Do not put it on a ventilator just so you can look like a doctor. Doing nothing [dn] is an active, and often the best, policy."
            }
        };

        // --- AUDIO ENGINE ---
        let audioCtx; let clickBuffer;

        function initAudio() {
            if (audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            const bufferSize = audioCtx.sampleRate * 0.05; 
            clickBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = clickBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        }

        function playThump() {
            if (!audioCtx || !state.soundEnabled) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(80, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playClick() {
            if (!audioCtx || !clickBuffer || !state.soundEnabled) return;
            const source = audioCtx.createBufferSource(); source.buffer = clickBuffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 4000;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.015);
            source.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            source.start(); source.stop(audioCtx.currentTime + 0.02);
        }

        function playAlarm() {
            if (!audioCtx || !state.soundEnabled) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'square'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.8);
        }

        function toggleSound() {
            state.soundEnabled = !state.soundEnabled;
            if(state.soundEnabled) { DOM.sLed.classList.add('on'); if(state.isOn) initAudio(); } 
            else { DOM.sLed.classList.remove('on'); }
        }

        // --- SYSTEM LOGIC ---

        function focusTerminal() { if (state.isOn && !DOM.cmd.disabled) DOM.cmd.focus(); }

        function enableInput() {
            DOM.inputLine.style.display = 'flex';
            DOM.cmd.disabled = false;
            focusTerminal();
        }

        function print(text, type = 'system') {
            const div = document.createElement('div');
            div.className = `block ${type}`; div.textContent = text;
            DOM.log.appendChild(div); DOM.log.scrollTop = DOM.log.scrollHeight;
        }

        function renderMacroDashboard() {
            DOM.telemetry.className = 'panel'; DOM.screen.classList.remove('war-mode'); DOM.prompt.textContent = "POTUS:~$";
            DOM.telemetry.innerHTML = `
                <div class="panel-title">MACRO TELEMETRY</div>
                <div class="metric-row hover-term" data-term="election"><span class="metric-label">MONTHS TO ELECTION:</span><span class="metric-value ${state.monthsToElection<=12?'warning':''}">${state.monthsToElection}</span></div>
                <div style="height:1px; border-bottom: 1px dashed var(--dim); margin-bottom: 8px;"></div>
                <div class="metric-row hover-term" data-term="gdp"><span class="metric-label">GDP GROWTH:</span><span class="metric-value ${state.gdp<1.5?'warning':(state.gdp>3?'good':'')}">${state.gdp.toFixed(1)}%</span></div>
                <div class="metric-row hover-term" data-term="unemployment"><span class="metric-label">UNEMPLOYMENT:</span><span class="metric-value ${state.unemployment>6?'warning':(state.unemployment<4?'good':'')}">${state.unemployment.toFixed(1)}%</span></div>
                <div class="metric-row hover-term" data-term="inflation"><span class="metric-label">INFLATION(PCE):</span><span class="metric-value ${state.inflation>3?'warning':(state.inflation<2?'good':'')}">${state.inflation.toFixed(1)}%</span></div>
                <div class="metric-row hover-term" data-term="sp500"><span class="metric-label">S&P 500:</span><span class="metric-value ${state.sp500<4800?'warning':'good'}">${Math.round(state.sp500).toLocaleString()}</span></div>
                <div style="height:10px;"></div>
                <div class="metric-row hover-term" data-term="approval"><span class="metric-label">APP RATING:</span><span class="metric-value">${Math.round(state.approval)}%</span></div>
                <div class="metric-row hover-term" data-term="congress"><span class="metric-label">CONGRESS APP:</span><span class="metric-value ${state.congress<=25?'warning':''}">${Math.round(state.congress)}%</span></div>
                <div class="metric-row hover-term" data-term="fed"><span class="metric-label">FED CRED:</span><span class="metric-value">${Math.round(state.fedCredibility)}%</span></div>
                <div class="metric-row hover-term" data-term="tariffs"><span class="metric-label">AVG TARIFF:</span><span class="metric-value ${state.tariffRate>10?'warning':''}">${state.tariffRate.toFixed(1)}%</span></div>
            `;
            DOM.cmdList.innerHTML = `
                <div style="text-align:center; font-weight:bold; padding-bottom:3px; opacity:0.8;">DIRECTIVES (Separate multiple with commas)</div>
                <div class="cmd-item highlight" style="margin-top:5px;">[am] ASK MILTON (Economic Counsel)</div>
                <div class="cmd-grid">
                    <div class="cmd-item">[rr] Rate Hike</div><div class="cmd-item">[dr] Deregulate</div>
                    <div class="cmd-item">[cr] Rate Cut</div> <div class="cmd-item">[ta] Tariffs</div>
                    <div class="cmd-item">[is] Inc Spend</div> <div class="cmd-item">[ft] Free Trade</div>
                    <div class="cmd-item">[cs] Cut Spend</div> <div class="cmd-item">[pc] Price Ctrl</div>
                    <div class="cmd-item">[ms] Stimulus</div>  <div class="cmd-item">[dn] Do Nothing</div>
                    ${state.currentCrisis === 'geopolitical' ? '<div class="cmd-item" style="color:var(--danger); grid-column: span 2; margin-top:5px; text-align:center;">[dm] Deploy Military / [ng] Negotiate</div>' : ''}
                </div>
            `;
        }

        function renderWarDashboard() {
            DOM.telemetry.className = 'panel war-mode'; DOM.screen.classList.add('war-mode'); DOM.prompt.textContent = "COMMAND:~$";
            DOM.telemetry.innerHTML = `
                <div class="panel-title" style="color:var(--danger); border-bottom-color:var(--danger);">THEATER COMMAND</div>
                <div class="metric-row hover-term" data-term="strength"><span class="metric-label">ENEMY STRENGTH:</span><span class="metric-value">${Math.max(0, state.war.enemyStrength)}%</span></div>
                <div class="metric-row hover-term" data-term="tension"><span class="metric-label">THEATER TENSION:</span><span class="metric-value ${state.war.tension>80?'warning':''}">${state.war.tension}%</span></div>
                <div class="metric-row hover-term" data-term="casualties"><span class="metric-label">CASUALTIES:</span><span class="metric-value warning">${state.war.casualties}</span></div>
                <div class="metric-row hover-term" data-term="expenditure"><span class="metric-label">EXPENDITURE:</span><span class="metric-value warning">$${state.war.expenditure}B</span></div>
                <div style="height:10px; border-bottom: 1px dashed var(--danger); margin-bottom: 10px;"></div>
                <div class="metric-row hover-term" data-term="approval"><span class="metric-label">DOMESTIC APP:</span><span class="metric-value">${Math.round(state.approval)}%</span></div>
            `;
            DOM.cmdList.innerHTML = `
                <div style="text-align:center; font-weight:bold; padding-bottom:3px; color:var(--danger); opacity:0.8;">TACTICAL DIRECTIVES (Chain with commas)</div>
                <div class="cmd-item highlight" style="border-color:var(--milton); color:var(--milton); margin-top:5px;">[am] ASK MILTON (Cost Analysis)</div>
                <div class="cmd-grid">
                    <div class="cmd-item">[as] Airstrike</div>  <div class="cmd-item">[so] Special Ops</div>
                    <div class="cmd-item">[bd] Blockade</div>   <div class="cmd-item">[wd] Withdraw</div>
                    <div class="cmd-item war-highlight" style="grid-column: span 2; margin-top:5px;">[es] ESCALATE (Ground Surge)</div>
                </div>
            `;
        }

        function updateDashboard() { if (state.mode === 'war') renderWarDashboard(); else renderMacroDashboard(); }

        function togglePower() {
            if (state.isOn) return; 
            state.isOn = true;
            if(state.soundEnabled) initAudio();
            playThump();
            
            DOM.pLed.classList.add('on');
            DOM.screen.classList.add('on');
            
            setTimeout(() => {
                print("SYSTEM MILTON BOOT... OK");
                print("AUTHORIZATION: POTUS... CONFIRMED");
                print("--------------------------------------------------");
                print("TUTORIAL:\nYour Chief of Staff advises on political optics.\nType [am] to ASK MILTON for structural economic analysis.\nYou may chain multiple directives using commas (e.g., rr, cs, ta).\nActions render instantly.");
                print("--------------------------------------------------\n");
                
                DOM.dash.style.visibility = 'visible';
                updateDashboard();
                runTurn();
            }, 800);
        }

        function triggerWarMode() {
            state.mode = 'war'; state.war.active = true; state.war.enemyStrength = 100; state.war.tension = 50; state.war.casualties = 0; state.war.expenditure = 0;
            playAlarm(); print("\nWARNING: KINETIC ACTION AUTHORIZED.", 'danger'); print("GENERAL: We are locked and loaded, sir. Give us the targets. Reduce Enemy Strength to 0. Watch the tension gauge—if it hits 100%, they launch the nukes and it's game over.", 'general');
            updateDashboard();
        }

        function endWar(victory) {
            state.mode = 'macro'; state.war.active = false;
            print("\nTHEATER COMMAND DISENGAGED. Total Expenditure: $"+state.war.expenditure+" Billion.", 'system');
            if (victory) { print("GENERAL: Enemy surrender confirmed. Total victory.", 'general'); state.approval += 25; } 
            else { print("GENERAL: Withdrawal complete. We are tucking tail.", 'general'); state.approval -= 20; }
            
            print(`MILTON: The war is over. Time to pay the bill. This deficit spending will now hit the macro economy.`, 'milton');
            let infHit = (state.war.expenditure / 10);
            let gdpHit = (state.war.expenditure / 20);
            state.inflation += infHit;
            state.gdp -= gdpHit;
            
            updateDashboard();
            setTimeout(advanceTimeline, 1000);
        }

        function determineCrisis() {
            if (state.turn === 4) return 'geopolitical'; 
            if (state.inflation > 4.5) return 'inflation';
            if (state.unemployment > 6.0) return 'unemployment';
            if (state.sp500 < 4500) return 'market_crash';
            if (state.approval < 45) return 'approval_drop';
            return 'stable';
        }

        function runTurn() {
            if (state.mode === 'war') return; 
            
            state.miltonAskedThisTurn = false;
            state.currentCrisis = determineCrisis();
            
            updateDashboard();
            print("\n--------------------------------------------------");
            
            if (state.currentCrisis === 'geopolitical') {
                playAlarm();
                print("SYSTEM: GLOBAL OIL SHOCK. STRAIT OF HORMUZ BLOCKADED BY HOSTILE ACTORS.", 'danger');
            }
            
            print(crisisProfiles[state.currentCrisis].chief, 'chief');
            enableInput();
        }

        function advanceTimeline() {
            state.turn++;
            state.monthsToElection -= 4;
            
            if (state.monthsToElection <= 0) {
                print("\n--- ELECTION DAY ---", 'system');
                if (state.inflation > 5 || state.unemployment > 8) {
                    print("CHIEF OF STAFF: It's a blowout. The voters blamed us for the economy. We lost the White House.", 'chief');
                    print("MILTON: As expected. You ignored the monetary fundamentals, and the market extracted its toll.", 'milton');
                } else if (state.approval < 40) {
                    print("CHIEF OF STAFF: We lost re-election. The political optics were just too terrible to overcome.", 'chief');
                    print("MILTON: True, but you took the necessary short-term hits and set up the foundation for the future. A thankless job.", 'milton');
                } else {
                    print("CHIEF OF STAFF: WE WON! Four more years! Drinks are on me!", 'chief');
                    print("MILTON: Congratulations, Mr. President. We maintained relatively free markets and stable money. A rare victory for structural restraint.", 'milton');
                }
                return;
            }
            
            if (state.mode === 'macro') {
                setTimeout(runTurn, 500);
            } else {
                enableInput();
            }
        }

        function processInput() {
            let rawVal = DOM.cmd.value.trim().toLowerCase();
            DOM.cmd.value = ''; DOM.visInput.textContent = '';
            if (!rawVal) return;
            
            DOM.inputLine.style.display = 'none';
            DOM.cmd.disabled = true;

            // Handle pure "Ask Milton" independently so it doesn't consume a turn
            if (rawVal === 'am' || rawVal === 'ask milton') {
                print(`${state.mode === 'war' ? 'COMMAND:~$' : 'POTUS:~$'} ${rawVal}`, 'user-echo');
                if (state.mode === 'war') {
                    print("MILTON: Airstrikes cost $15B. Blockades spike global inflation. Ground ops cost $25B and cause casualties, which hurts approval. Do not bankrupt the country for a sandbox war.", 'milton');
                } else {
                    if (state.miltonAskedThisTurn) {
                        print("MILTON: I already gave you my analysis, boss. The ball is in your court.", 'milton');
                    } else {
                        print(crisisProfiles[state.currentCrisis].milton, 'milton');
                        state.miltonAskedThisTurn = true;
                    }
                }
                enableInput();
                return; 
            }

            // OMNIBUS PARSER: Split by commas or 'and', map to dictionary
            let dict = state.mode === 'war' ? warCommands : macroCommands;
            let tokens = rawVal.replace(/ and /g, ',').split(/[,]+/).map(t => t.trim()).filter(t => t);
            
            let activeCommands = [];
            let unrecognized = false;

            for (let token of tokens) {
                let found = false;
                for (let key in dict) {
                    if (key === token || dict[key].shortcut === token || dict[key].name.toLowerCase() === token) {
                        if (!activeCommands.includes(key)) activeCommands.push(key);
                        found = true; break;
                    }
                }
                if (!found) unrecognized = true;
            }

            if (unrecognized || activeCommands.length === 0) {
                print(`${state.mode === 'war' ? 'COMMAND:~$' : 'POTUS:~$'} ${rawVal}`, 'user-echo');
                print("SYSTEM: Unrecognized directive found in package. Aborting to prevent execution errors.", 'danger');
                enableInput();
                return;
            }

            // Print the Omnibus Execution
            let execNames = activeCommands.map(k => dict[k].name);
            print(`${state.mode === 'war' ? 'COMMAND:~$' : 'POTUS:~$'} EXECUTE: [ ${execNames.join(' | ')} ]`, 'user-echo');
            
            let synergies = [];

            // --- RESOLVE SYNERGIES & CONFLICTS (MACRO) ---
            if (state.mode === 'macro') {
                // Conflicts
                if (activeCommands.includes('rr') && activeCommands.includes('cr')) {
                    activeCommands = activeCommands.filter(c => c !== 'rr' && c !== 'cr');
                    synergies.push("MILTON: Raising and cutting rates simultaneously? The Fed is paralyzed by your conflicting orders. Zero net monetary effect.");
                }
                if (activeCommands.includes('ta') && activeCommands.includes('ft')) {
                    activeCommands = activeCommands.filter(c => c !== 'ta' && c !== 'ft');
                    synergies.push("MILTON: You imposed tariffs and declared free trade on the same day. Customs agents are ignoring you. Zero net trade effect.");
                }
                if ((activeCommands.includes('is') || activeCommands.includes('ms')) && activeCommands.includes('cs')) {
                    activeCommands = activeCommands.filter(c => c !== 'is' && c !== 'ms' && c !== 'cs');
                    synergies.push("MILTON: Massive spending combined with severe austerity? The treasury is deadlocked. Zero net fiscal effect.");
                }

                // Combos
                if ((activeCommands.includes('ms') || activeCommands.includes('is')) && activeCommands.includes('pc')) {
                    synergies.push("MILTON: Stimulus combined with price controls... You've flooded the market with cash but made it illegal for prices to adjust. Prepare for immediate, catastrophic supply shortages.");
                    state.gdp -= 3.0; state.approval -= 8;
                }
            }

            // --- RESOLVE SYNERGIES & CONFLICTS (WAR) ---
            if (state.mode === 'war') {
                if (activeCommands.includes('as') && activeCommands.includes('go')) {
                    synergies.push("GENERAL: Combined arms assault authorized! We softened them from the air and swept them on the ground. Highly effective!");
                    state.war.enemyStrength -= 15; // Bonus damage
                }
                if (activeCommands.includes('wd')) {
                    activeCommands = ['wd']; // Withdraw overrides everything else
                }
            }

            // Apply Synergies to output
            for (let syn of synergies) {
                if (syn.startsWith("GENERAL")) print(syn, 'general');
                else print(syn, 'milton');
            }

            // Apply remaining valid base effects
            for (let key of activeCommands) {
                if (key === 'nk') print("GENERAL: THERMONUCLEAR LAUNCH CONFIRMED! GOD BLESS AMERICA!", 'general');
                else if (key === 'dm') print("GENERAL: CARRIER STRIKE GROUP DEPLOYED. TARGETS NEUTRALIZED.", 'general');
                else if (key === 'ml') print("GENERAL: TROOPS DEPLOYED. CURFEWS ENFORCED. STREETS SECURED.", 'general');
                else if (state.mode === 'war' && key !== 'wd') print(`GENERAL: ${dict[key].name} executed.`, 'general');
                
                dict[key].effect();
            }
            
            // --- POST-EXECUTION LOOP (WAR) ---
            if (state.mode === 'war') {
                if (!activeCommands.includes('wd')) {
                    if (state.war.enemyStrength > 0) { state.war.casualties += Math.floor(Math.random()*30); state.approval -= 2; }
                    updateDashboard();
                    
                    if (state.war.tension >= 100) { playAlarm(); setTimeout(()=>DOM.screen.innerHTML='<div style="color:black; background:white; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:50px; font-weight:bold;">MUTUALLY ASSURED DESTRUCTION</div>', 1000); return; }
                    if (state.war.enemyStrength <= 0) { setTimeout(()=>endWar(true), 1000); return; }
                    if (state.approval <= 15) { print("SYSTEM: WAR PROTESTS OVERWHELM CAPITAL. CONGRESS VOTES IMPEACHMENT.", 'danger'); return; }
                    
                    setTimeout(enableInput, 500);
                }
                return;
            }

            // --- POST-EXECUTION LOOP (MACRO) ---
            if (!activeCommands.includes('pc')) state.hasPriceControls = false;

            if (state.tariffRate > 0) {
                let drag = state.tariffRate * 0.05;
                state.inflation += drag; state.gdp -= (drag * 0.5);
            }

            let drift = 0;
            if (state.inflation > 3.0) drift -= (state.inflation - 3.0) * 1.5;
            if (state.unemployment > 5.0) drift -= (state.unemployment - 5.0) * 1.5;
            if (state.gdp < 1.0) drift -= 2;
            if (state.inflation <= 2.5) drift += 2.5;
            if (state.unemployment <= 4.5) drift += 2.0;
            if (state.gdp >= 3.0) drift += 2.0;
            if (state.sp500 >= 5200) drift += 1.5;
            
            state.approval += drift;

            // Clamps
            state.gdp = Math.max(-15, state.gdp); state.unemployment = Math.min(35, Math.max(2, state.unemployment));
            state.inflation = Math.max(-3, state.inflation); state.approval = Math.min(100, Math.max(0, state.approval));
            state.congress = Math.min(100, Math.max(0, state.congress)); state.fedCredibility = Math.min(100, Math.max(0, state.fedCredibility));
            state.sp500 = Math.max(500, state.sp500);

            if (drift >= 4) print(`SYSTEM: Macro stabilization noted by electorate. Approval +${drift.toFixed(1)}%`);
            if (drift <= -4) print(`SYSTEM: Macro distress penalizing incumbent. Approval ${drift.toFixed(1)}%`, 'danger');

            updateDashboard();

            if (state.congress <= 15) {
                print("\nSYSTEM: IMPEACHMENT PASSED. EXECUTIVE REMOVED.", 'danger');
                print("CHIEF OF STAFF: Pack your bags, sir. We're done.", 'chief');
                return;
            }

            setTimeout(advanceTimeline, 800);
        }

        // --- GLOBAL EVENT DELEGATION ---
        
        DOM.cmd.addEventListener('input', (e) => { DOM.visInput.textContent = e.target.value.toLowerCase(); });
        DOM.cmd.addEventListener('keydown', (e) => {
            if (e.key.length === 1 || e.key === 'Backspace') playClick();
            if (e.key === 'Enter') processInput();
        });
        DOM.cmd.addEventListener('blur', () => {
            if (state.isOn && !DOM.cmd.disabled) setTimeout(() => DOM.cmd.focus(), 10);
        });

        document.addEventListener('mouseover', (e) => {
            const target = e.target.closest('.hover-term');
            if (!target || !state.isOn) return;
            const data = contextDict[target.getAttribute('data-term')];
            if(data) {
                DOM.dict.innerHTML = `
                    <div class="context-title">${data.title}</div>
                    <div class="context-def">${data.def}</div>
                    <div class="context-hist">PRECEDENT: ${data.hist}</div>
                `;
            }
        });
        
        document.addEventListener('mouseout', (e) => {
            const target = e.target.closest('.hover-term');
            if (!target || !state.isOn) return;
            DOM.dict.innerHTML = `
                <div class="context-title">ECONOMIC INTELLIGENCE</div>
                <div class="context-def">Hover over metrics to access structural definitions and behavioral precedents.</div>
            `;
        });

    </script>
</body>
</html>
