<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESIDENTIAL TERMINAL - MILTON v12.2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        :root {
            --phosphor: #ffb000; 
            --milton: #e8e8e8;   
            --bg: #0a0600;
            --dim: rgba(255, 176, 0, 0.3);
            --danger: #ff3300;
            --good: #4af626;
            --war: #ff4444;
            --dark: #b366ff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000; font-family: 'VT323', monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; padding: 2vh 2vw; overflow: hidden;
            font-size: 22px; color: var(--phosphor); letter-spacing: 1px;
        }

        .hardware-bezel {
            width: 100%; max-width: 1600px; height: 100%;
            background: #111; border-radius: 12px;
            padding: 20px 20px 90px 20px; 
            box-shadow: inset 0 0 20px #000, 0 0 50px #000;
            display: flex; flex-direction: column; position: relative;
        }

        .crt-screen {
            background: var(--bg); flex-grow: 1; border-radius: 8px;
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            opacity: 0; transition: opacity 0.1s, background-color 0.5s;
        }
        .crt-screen.on { opacity: 1; }
        .crt-screen.war-mode { background: #1a0500; } 
        .crt-screen.dark-mode { background: #0d001a; } 

        .scanlines {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.15) 50%, rgba(0,0,0,0.15));
            background-size: 100% 4px; pointer-events: none; z-index: 50;
        }
        
        .glow {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(255,176,0,0.02) 0%, rgba(0,0,0,0.3) 100%);
            pointer-events: none; z-index: 49;
        }

        .ticker-bar {
            display: flex; background: rgba(255, 176, 0, 0.08);
            border-bottom: 2px solid var(--dim); height: 35px;
            align-items: center; flex-shrink: 0; z-index: 20; position: relative;
        }
        .ticker-label {
            background: var(--phosphor); color: #000; font-weight: bold;
            padding: 0 15px; height: 100%; display: flex; align-items: center;
            z-index: 21; box-shadow: 2px 0 10px rgba(0,0,0,0.8);
        }
        .ticker-viewport { flex-grow: 1; overflow: hidden; position: relative; height: 100%; }
        .ticker-scroll {
            position: absolute; white-space: nowrap; line-height: 35px;
            animation: scroll 25s linear infinite; text-shadow: 0 0 2px var(--phosphor); font-size: 20px;
        }
        @keyframes scroll { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        .system-grid {
            display: grid; grid-template-columns: 1fr 430px; 
            flex-grow: 1; position: relative; z-index: 10; overflow: hidden; 
        }

        .terminal-area {
            display: flex; flex-direction: column; padding: 20px 30px 10px 30px; 
            height: 100%; border-right: 2px solid var(--dim); cursor: text; overflow: hidden;
        }

        #artilleryCanvas {
            width: 100%; height: 250px; flex-shrink: 0;
            background: rgba(255, 68, 68, 0.05);
            border: 1px solid var(--war); border-radius: 4px;
            margin-bottom: 15px; display: none;
            box-shadow: inset 0 0 15px rgba(255, 68, 68, 0.2);
        }

        .log-output {
            flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column;
            justify-content: flex-start; padding-bottom: 15px;
        }
        .log-output::-webkit-scrollbar { display: none; }
        .log-output { -ms-overflow-style: none; scrollbar-width: none; }

        .block { margin-bottom: 15px; line-height: 1.3; white-space: pre-wrap; text-shadow: 0 0 2px var(--phosphor); }
        .block.system { opacity: 0.8; }
        .block.chief { font-weight: bold; color: var(--phosphor); border-left: 3px solid var(--phosphor); padding-left: 15px; }
        .block.milton { color: var(--milton); font-size: 20px; border-left: 3px solid var(--milton); padding-left: 15px; text-shadow: 0 0 2px var(--milton); opacity: 0.95; }
        .block.danger { color: var(--danger); text-shadow: 0 0 3px var(--danger); font-weight: bold; }
        .block.general { color: var(--war); text-shadow: 0 0 3px var(--war); border-left: 3px solid var(--war); padding-left: 15px; font-weight: bold; }
        .block.dark { color: var(--dark); text-shadow: 0 0 3px var(--dark); border-left: 3px solid var(--dark); padding-left: 15px; font-weight: bold; }
        .block.user-echo { font-weight: bold; opacity: 0.9; }

        .input-line {
            display: flex; align-items: center; margin-top: auto;
            flex-shrink: 0; display: none; padding-bottom: 8px; font-size: 24px;
        }
        .prompt { margin-right: 10px; text-shadow: 0 0 2px var(--phosphor); font-weight: bold; }
        #visualInput { white-space: pre; text-transform: lowercase; text-shadow: 0 0 2px var(--phosphor); }
        .cursor {
            display: inline-block; width: 14px; height: 24px; background: var(--phosphor); 
            animation: blink 1s step-end infinite; margin-left: 2px; vertical-align: text-bottom; box-shadow: 0 0 3px var(--phosphor);
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        #cmd { position: absolute; opacity: 0; left: -9999px; top: -9999px; pointer-events: none; }

        .dashboard-area {
            padding: 20px; display: flex; flex-direction: column; gap: 12px; 
            background: rgba(10, 6, 0, 0.4); cursor: default; height: 100%; overflow: hidden; 
        }

        .panel {
            border: 2px solid var(--phosphor); padding: 10px 15px;
            box-shadow: inset 0 0 10px var(--dim); transition: border-color 0.3s; flex-shrink: 0; 
        }
        .panel.war-mode { border-color: var(--war); box-shadow: inset 0 0 20px rgba(255, 68, 68, 0.2); }
        .panel.dark-mode { border-color: var(--dark); box-shadow: inset 0 0 20px rgba(179, 102, 255, 0.2); }

        .panel-title { text-align: center; border-bottom: 2px solid var(--dim); padding-bottom: 5px; margin-bottom: 8px; letter-spacing: 2px; font-weight: bold; }
        .metric-header { display: grid; grid-template-columns: 1fr 80px 80px; font-size: 16px; opacity: 0.6; margin-bottom: 5px; text-align: right; border-bottom: 1px solid var(--dim); padding-bottom: 2px; }
        .mh-label { text-align: left; }
        
        .metric-row { display: grid; grid-template-columns: 1fr 80px 80px; align-items: center; margin-bottom: 6px; cursor: help; }
        .metric-row:hover { background: var(--dim); }
        .metric-label { opacity: 0.8; text-shadow: 0 0 1px var(--phosphor); }
        .metric-value { font-weight: bold; text-shadow: 0 0 2px var(--phosphor); text-align: right; transition: color 0.3s;}
        .metric-target { opacity: 0.5; text-shadow: none; color: var(--phosphor); text-align: right; font-size: 20px; }

        .metric-value.warning { color: var(--danger); text-shadow: 0 0 3px var(--danger); }
        .metric-value.good { color: var(--good); text-shadow: 0 0 3px var(--good); }
        .metric-value.warning + .metric-target { color: var(--danger); opacity: 0.7; }
        .metric-value.good + .metric-target { color: var(--good); opacity: 0.7; }

        .dict-box {
            flex-grow: 1; border: 1px solid var(--dim); padding: 15px; font-size: 18px; line-height: 1.3; 
            background: rgba(255, 176, 0, 0.05); display: flex; flex-direction: column; overflow-y: auto; min-height: 80px; 
            transition: all 0.3s;
        }
        .dict-box::-webkit-scrollbar { display: none; }
        .context-title { font-weight: bold; font-size: 20px; margin-bottom: 6px; border-bottom: 1px solid var(--phosphor); padding-bottom: 4px; text-shadow: 0 0 1px var(--phosphor); flex-shrink: 0; transition: color 0.3s, border-color 0.3s;}
        .context-def { margin-bottom: 8px; text-shadow: 0 0 1px var(--phosphor); }
        .context-hist { font-style: italic; opacity: 0.9; border-left: 2px solid var(--phosphor); padding-left: 10px; text-shadow: 0 0 1px var(--phosphor); color: var(--milton); }

        .cmd-list { flex-shrink: 0; font-size: 18px; opacity: 0.9; border-top: 2px dashed var(--dim); padding-top: 10px; text-shadow: 0 0 1px var(--phosphor); padding-bottom: 5px; }
        .cmd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px; }
        .cmd-item { font-size: 18px; }
        .cmd-item.highlight { border: 1px solid var(--milton); color: var(--milton); padding: 2px 4px; border-radius: 3px; text-shadow: none; text-align: center; margin-bottom: 8px;}
        .cmd-item.war-highlight { border: 1px solid var(--war); color: var(--war); text-shadow: none; text-align: center;}
        .cmd-item.dark-highlight { border: 1px solid var(--dark); color: var(--dark); text-shadow: none; text-align: center;}

        .hardware-controls { position: absolute; bottom: 22px; right: 35px; display: flex; gap: 25px; z-index: 100; }
        .hw-btn {
            width: 48px; height: 48px; background: #2a2a2a; border: 2px solid #000; border-radius: 50%;
            cursor: pointer; box-shadow: 0 4px 0 #000, inset 0 2px 5px rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; color: #111; 
            font-family: sans-serif; text-shadow: 1px 1px 0 rgba(255,255,255,0.15); transition: all 0.1s; position: relative;
        }
        .hw-btn:hover { background: #333; }
        .hw-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #000, inset 0 2px 5px rgba(255,255,255,0.1); }
        .hw-icon { font-size: 20px; } .hw-icon.power { font-size: 24px; }
        
        .hw-led { width: 9px; height: 9px; border-radius: 50%; position: absolute; top: -17px; left: 18px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.8); }
        .hw-led.amber { background: #331a00; } .hw-led.amber.on { background: #ffaa00; box-shadow: 0 0 10px #ffaa00, inset 0 1px 2px rgba(255,255,255,0.5); }
        .hw-led.green { background: #003300; } .hw-led.green.on { background: #4af626; box-shadow: 0 0 10px #4af626, inset 0 1px 2px rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <div class="hardware-bezel">
        <div class="crt-screen" id="screen">
            <div class="scanlines"></div><div class="glow"></div>
            
            <div class="ticker-bar" id="tickerBar" style="visibility:hidden;">
                <div class="ticker-label">NEWSWIRE</div>
                <div class="ticker-viewport">
                    <div class="ticker-scroll" id="tickerContent">AWAITING SYSTEM BOOT...</div>
                </div>
            </div>

            <div class="system-grid">
                <div class="terminal-area" onclick="focusTerminal()">
                    <canvas id="artilleryCanvas"></canvas>
                    <div class="log-output" id="logOutput"></div>
                    <div class="input-line" id="inputLine">
                        <span class="prompt" id="promptText">POTUS:~$</span>
                        <span id="visualInput"></span><div class="cursor" id="cursorIndicator"></div>
                        <input type="text" id="cmd" autocomplete="off" spellcheck="false" maxlength="60">
                    </div>
                </div>

                <div class="dashboard-area" id="dashboardArea" style="visibility:hidden;">
                    <div class="panel" id="telemetryPanel"></div>
                    <div class="dict-box" id="dictBox">
                        <div class="context-title" id="dictTitle">INTELLIGENCE</div>
                        <div class="context-def" id="dictDef">Hover over metrics to access structural definitions and precedents.</div>
                        <div class="context-hist" id="dictHist" style="display:none;"></div>
                    </div>
                    <div class="cmd-list" id="cmdListArea"></div>
                </div>
            </div>
        </div>

        <div class="hardware-controls">
            <div class="hw-btn" onclick="toggleSound()" title="TOGGLE SOUND">
                <div class="hw-led green on" id="soundLed"></div><div class="hw-icon">🔊</div>
            </div>
            <div class="hw-btn" onclick="togglePower()" title="POWER">
                <div class="hw-led amber" id="powerLed"></div><div class="hw-icon power">⏻</div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            isOn: false, soundEnabled: true,
            mode: 'macro', subMode: null, turn: 1, maxTurns: 12, monthsToElection: 48,
            gdp: 2.1, unemployment: 5.1, inflation: 4.8, approval: 48, fedCredibility: 80, sp500: 4800, congress: 55, tariffRate: 5.0,
            hasPriceControls: false, currentCrisis: '', miltonAskedThisTurn: false,
            war: { enemyStrength: 100, tension: 50, casualties: 0, expenditure: 0 },
            dark: { narrative: 45, compliance: 50, paranoia: 25, trust: 75 },
            newsQueue: [], futureNews: [] 
        };

        const DOM = {
            screen: document.getElementById('screen'), pLed: document.getElementById('powerLed'), sLed: document.getElementById('soundLed'),
            log: document.getElementById('logOutput'), inputLine: document.getElementById('inputLine'), cmd: document.getElementById('cmd'),
            visInput: document.getElementById('visualInput'), dash: document.getElementById('dashboardArea'),
            telemetry: document.getElementById('telemetryPanel'), cmdList: document.getElementById('cmdListArea'),
            dict: document.getElementById('dictBox'), dictTitle: document.getElementById('dictTitle'), dictDef: document.getElementById('dictDef'), dictHist: document.getElementById('dictHist'),
            prompt: document.getElementById('promptText'), tickerBar: document.getElementById('tickerBar'), tickerContent: document.getElementById('tickerContent'),
            canvas: document.getElementById('artilleryCanvas')
        };

        const contextDict = {
            'election': { title: "ELECTION COUNTDOWN", def: "The ultimate accountability mechanism.", hist: "Voters almost always punish structural reality if it causes them immediate financial pain." },
            'gdp': { title: "GROSS DOMESTIC PRODUCT", def: "Total economic output. Fails to distinguish between productive capital and wasteful deficit spending.", hist: "Juicing GDP with printed money looks like a boom right before it feels like a bust." },
            'unemployment': { title: "UNEMPLOYMENT RATE", def: "A 'natural rate' exists to allow labor to move to where it is needed.", hist: "The Phillips Curve tradeoff is an illusion. Forcing unemployment to zero via stimulus guarantees inflation." },
            'inflation': { title: "INFLATION (PCE)", def: "Taxation without representation, driven by expanding the fiat money supply.", hist: "It requires brutal, sustained interest rate hikes to break the psychological loop of inflation." },

            'tariffs': { title: "AVERAGE TARIFF RATE", def: "A direct tax levied on your own domestic consumers under the guise of punishing foreigners.", hist: "The Smoot-Hawley Tariff Act of 1930 drastically worsened the Great Depression." },
            'strength': { title: "ENEMY STRENGTH", def: "Remaining combat capacity of the hostile force.", hist: "Reaching 0% signifies theater victory." },
            'tension': { title: "THEATER TENSION", def: "The likelihood of a global nuclear exchange.", hist: "Reaching 100% triggers Mutually Assured Destruction." },
            'casualties': { title: "CASUALTIES", def: "American lives lost. Drags heavily on domestic approval.", hist: "Prolonged kinetic engagements reliably destroy incumbent administrations." },
            'expenditure': { title: "WAR EXPENDITURE", def: "Billions burned in the theater. Hits the macro economy upon return.", hist: "War is the ultimate destroyer of economic capital." },
            'narrative': { title: "NARRATIVE CONTROL", def: "Percentage of the population accepting the state-sanctioned reality.", hist: "Requires constant algorithmic and financial expenditure to maintain against the natural entropy of truth." },
            'compliance': { title: "PRESS COMPLIANCE", def: "Media willingness to repeat executive talking points without adversarial friction.", hist: "Operation Mockingbird demonstrated the utility of embedded assets in editorial boards." },
            'paranoia': { title: "PUBLIC PARANOIA", def: "Societal fracture and conspiracy adoption.", hist: "When the official narrative diverges too far from observed reality, institutional collapse follows. (>80% is critical)" },
            'trust': { title: "INSTITUTIONAL TRUST", def: "Public faith in the structural integrity of the state.", hist: "Takes decades to build, can be spent in a single term, and is nearly impossible to restore once lost." }
        };

        const macroCommands = {
            'rr': { shortcut: 'rr', name: 'RAISE RATES', effect: () => { state.gdp-=0.6; state.inflation-=0.8; state.unemployment+=0.5; state.sp500-=300; state.fedCredibility+=5; state.approval-=2; state.congress+=2; queueNews("[FED WATCH] Chairman announces aggressive rate hike.", 0); queueNews("[HOUSING] Mortgage applications plummet as borrowing costs soar.", 2); } },
            'cr': { shortcut: 'cr', name: 'CUT RATES', effect: () => { state.gdp+=0.5; state.inflation+=0.7; state.unemployment-=0.3; state.sp500+=400; state.fedCredibility-=6; state.approval+=3; queueNews("[MARKETS] Fed slashes rates. Easy money returns.", 0); queueNews("[ECONOMY] Asset bubbles expanding rapidly amid cheap liquidity.", 2); } },
            'is': { shortcut: 'is', name: 'INC SPENDING', effect: () => { state.gdp+=0.4; state.inflation+=0.5; state.unemployment-=0.2; state.sp500+=150; state.approval+=2; state.congress+=5; queueNews("[GOV] Spending bill signed into law.", 0); queueNews("[TREASURY] National deficit swells; bond yields rise.", 2); } },
            'cs': { shortcut: 'cs', name: 'CUT SPENDING', effect: () => { state.gdp-=0.3; state.inflation-=0.4; state.unemployment+=0.2; state.sp500-=100; state.approval-=2; state.congress-=3; queueNews("[POLICY] White House implements austerity measures.", 0); queueNews("[DOMESTIC] Public sector layoffs trigger protests.", 2); } },
            'ms': { shortcut: 'ms', name: 'STIMULUS', effect: () => { state.gdp+=0.8; state.inflation+=1.5; state.unemployment-=0.6; state.sp500+=600; state.fedCredibility-=10; state.approval+=5; state.congress+=10; queueNews("[BREAKING] Trillions authorized in emergency relief.", 0); queueNews("[INFLATION] 'Transitory' narrative collapses as CPI surges.", 2); } },
            'dr': { shortcut: 'dr', name: 'DEREGULATE', effect: () => { state.gdp+=0.4; state.inflation-=0.2; state.unemployment-=0.2; state.sp500+=150; state.approval+=1; state.congress-=2; queueNews("[BIZ] Sweeping deregulation enacted across key sectors.", 0); } },
            'ta': { shortcut: 'ta', name: 'RAISE TARIFFS', effect: () => { state.tariffRate+=5.0; state.sp500-=250; state.congress+=2; queueNews("[TRADE] Administration enacts sweeping tariffs.", 0); queueNews("[GLOBAL] Trading partners announce retaliatory levies.", 2); } },
            'ft': { shortcut: 'ft', name: 'FREE TRADE', effect: () => { state.tariffRate=Math.max(0, state.tariffRate-5.0); state.sp500+=150; state.gdp+=0.2; queueNews("[TRADE] Tariffs slashed. Borders open.", 0); } },
            'pc': { shortcut: 'pc', name: 'PRICE CONTROLS', effect: () => { state.inflation-=1.5; state.gdp-=1.2; state.sp500-=500; state.unemployment+=0.8; state.hasPriceControls=true; state.congress-=10; queueNews("[POLICY] Executive order freezes consumer prices.", 0); queueNews("[MAIN STREET] Empty shelves reported. Black market premiums hit 300%.", 2); } },
            'dn': { shortcut: 'dn', name: 'DO NOTHING', effect: () => { state.gdp-=0.1; state.inflation-=0.2; state.sp500+=50; queueNews("[CAPITAL] Administration stays the course. Markets digest inaction.", 0); } },
            'ng': { shortcut: 'ng', name: 'NEGOTIATE', effect: () => { state.sp500+=400; state.inflation-=1.0; state.approval-=5; state.congress-=8; queueNews("[GLOBAL] Diplomatic settlement reached. Kinetic action avoided.", 0); queueNews("[POLITICS] Critics slam administration for projecting weakness.", 1); } },
            'dm': { shortcut: 'dm', name: 'DEPLOY MILITARY', effect: () => { triggerWarMode(); queueNews("[BREAKING] KINETIC ACTION AUTHORIZED. MILITARY DEPLOYED.", 0); } },
            'do': { shortcut: 'do', name: 'DARK OPS', effect: () => { triggerDarkMode(); queueNews("[MEDIA] Sudden shift in editorial narratives noticed across networks.", 0); } }
        };

        const warCommands = {
            'as': { shortcut: 'as', name: 'ARTILLERY STRIKE', effect: () => { initArtilleryMode(); } },
            'bd': { shortcut: 'bd', name: 'BLOCKADE', effect: () => { state.war.enemyStrength-=10; state.war.tension-=5; state.war.expenditure+=5; state.inflation+=1.0; queueNews("[THEATER] Naval assets establish strict embargo.", 0); } },
            'go': { shortcut: 'go', name: 'GROUND OPS', effect: () => { state.war.enemyStrength-=35; state.war.casualties+=150; state.war.expenditure+=25; state.war.tension+=20; state.approval-=5; queueNews("[THEATER] Boots on the ground. Infantry engaged in heavy combat.", 0); } },
            'so': { shortcut: 'so', name: 'SPECIAL OPS', effect: () => { 
                if(Math.random() > 0.4) { state.war.enemyStrength-=15; state.war.expenditure+=2; queueNews("[THEATER] Unconfirmed reports of surgical strike on HVT.", 0); } 
                else { state.war.casualties+=25; state.war.tension+=15; state.approval-=3; queueNews("[BREAKING] Covert team compromised. Casualties reported.", 0); }
            } },
            'es': { shortcut: 'es', name: 'ESCALATE', effect: () => { state.war.enemyStrength-=50; state.war.casualties+=400; state.war.expenditure+=50; state.war.tension+=40; state.approval-=12; queueNews("[BREAKING] MASSIVE SURGE DEPLOYED. CASUALTIES MOUNTING RAPIDLY.", 0); } },
            'wd': { shortcut: 'wd', name: 'WITHDRAW', effect: () => { endWar(false); queueNews("[THEATER] Evacuation orders given. Forces retreating.", 0); } }
        };

        const darkCommands = {
            'ff': { shortcut: 'ff', name: 'FEAR CAMPAIGN', effect: () => { state.dark.narrative+=15; state.dark.paranoia+=20; state.approval+=8; state.dark.trust-=10; queueNews("[ALERT] Homeland Security raises threat level. Citizens urged to report suspicious activity.", 0); queueNews("[FRINGE] Unverified claims of state-sponsored provocations trending.", 2); } },
            'ce': { shortcut: 'ce', name: 'CENSOR ENGINE', effect: () => { state.dark.compliance+=20; state.dark.narrative+=10; state.dark.paranoia+=15; state.dark.trust-=15; queueNews("[TECH] Major platforms announce new 'Fact-Check' partnerships to combat disinformation.", 0); } },
            'sm': { shortcut: 'sm', name: 'SUBSIDIZE MEDIA', effect: () => { state.dark.compliance+=25; state.gdp-=0.5; state.inflation+=0.5; queueNews("[EDITORIAL] Why the President's bold new strategy is exactly what America needs.", 0); } },
            'sl': { shortcut: 'sl', name: 'STRATEGIC LEAK', effect: () => { state.approval+=10; state.dark.trust-=20; state.congress-=15; queueNews("[BOMBSHELL] Anonymous sources reveal devastating allegations against opposition leaders.", 0); } },
            'ex': { shortcut: 'ex', name: 'EXIT OPS', effect: () => { endDarkOps(); queueNews("[POLITICS] Spin cycle slows down as administration pivots.", 0); } }
        };

        const crisisProfiles = {
            'inflation': { chief: "COS: Inflation is killing us. I strongly advise PRICE CONTROLS [pc] to stop corporate gouging, or initiate DARK OPS [do] to spin the narrative!", milton: "MILTON: Price controls destroy the signaling mechanism of the free market. You will cure high prices with empty supermarket shelves. Restrict the money supply. Raise rates [rr] or cut spending [cs]." },
            'unemployment': { chief: "COS: The rust belt is bleeding jobs. Authorize MASSIVE STIMULUS [ms], TARIFFS [ta], or launch DARK OPS [do] to distract the populace!", milton: "MILTON: You can juice the GDP today with stimulus, but inflation will eat your approval ratings alive tomorrow. Tariffs secretly tax Americans at the register. Let the market clear via deregulation [dr]." },

        let audioCtx; let clickBuffer; let humOscillator;

        function initAudio() {
            if (audioCtx) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                return;
            }
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                const bufferSize = audioCtx.sampleRate * 0.05; 
                clickBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = clickBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            } catch (e) { console.warn("Audio Context Failed:", e); state.soundEnabled = false; DOM.sLed.classList.remove('on'); }
        }

        function playHum() {
            if (!audioCtx || !state.soundEnabled || humOscillator) return;
            humOscillator = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
            humOscillator.type = 'sine'; humOscillator.frequency.value = 60; 
            gainNode.gain.value = 0.015; humOscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
            humOscillator.start();
        }
        function stopHum() { if (humOscillator) { humOscillator.stop(); humOscillator.disconnect(); humOscillator = null; } }

        function playThump() {
            if (!audioCtx || !state.soundEnabled) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(80, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playClick() {
            if (!audioCtx || !clickBuffer || !state.soundEnabled) return;
            const source = audioCtx.createBufferSource(); source.buffer = clickBuffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 4000;
            const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.015);
            source.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); source.start(); source.stop(audioCtx.currentTime + 0.02);
        }

        function playBell(isDark = false) {
            if (!audioCtx || !state.soundEnabled) return;
            const t = audioCtx.currentTime;
            const playPing = (time) => {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = isDark ? 'square' : 'sine';
                osc.frequency.setValueAtTime(isDark ? 600 : 1200, time);
                osc.frequency.exponentialRampToValueAtTime(isDark ? 400 : 800, time + 0.1);
                gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(0.4, time + 0.02); gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(time); osc.stop(time + 0.15);
            };
            playPing(t); playPing(t + 0.12);
        }

        function playLaunch() {
            if (!audioCtx || !state.soundEnabled) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 1.2);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.2);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 1.2);
        }

        function playExplosion() {
            if (!audioCtx || !clickBuffer || !state.soundEnabled) return;
            const source = audioCtx.createBufferSource(); source.buffer = clickBuffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 800;
            const gain = audioCtx.createGain(); gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
            source.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); source.start(); source.stop(audioCtx.currentTime + 0.8);
        }

            if (activeNews.length === 0) activeNews = ["[SYSTEM] ALL METRICS NOMINAL. NO BREAKING REPORTS AT THIS TIME."];

            if (state.monthsToElection <= 0) {
                print("\n--- ELECTION DAY ---", 'system');
                if (state.inflation > 5 || state.unemployment > 8) { print("CHIEF OF STAFF: It's a blowout. The voters blamed us for the economy. We lost.", 'chief'); print("MILTON: As expected. You ignored the monetary fundamentals.", 'milton'); } 
                else if (state.approval < 50) { print("CHIEF OF STAFF: We lost re-election. The political optics were just too terrible to overcome.", 'chief'); print("MILTON: True, but you took the necessary short-term hits and set up the foundation for the future.", 'milton'); } 
                else { print("CHIEF OF STAFF: WE WON! Four more years!", 'chief'); print("MILTON: Congratulations, Mr. President. A rare victory for structural restraint.", 'milton'); }
                print("\nSYSTEM: SIMULATION CONCLUDED. TYPE 'RESET' TO RESTART.", 'system');
                enableInput(); return;
            }
            if (state.mode === 'macro') setTimeout(runTurn, 500); else enableInput();
        }

        // --- ARTILLERY SUB-MODULE ---
        let artCtx; let artLoopId;
        const artState = { pX: 30, groundY: 220, targetX: 0, proj: null };

        function initArtilleryMode() {
            state.subMode = 'artillery'; DOM.canvas.style.display = 'block';
            DOM.canvas.width = DOM.canvas.clientWidth || 400; DOM.canvas.height = 250;
            artCtx = DOM.canvas.getContext('2d');
            let safeW = DOM.canvas.width;
            artState.targetX = Math.max(150, Math.min(safeW - 100, Math.random() * (safeW - 250) + 150));
            updateDashboard(); drawArtilleryBase();
            print("SYSTEM: ARTILLERY TARGETING ACTIVE. INPUT ANGLE AND YIELD.", 'danger');
        }

        function drawArtilleryBase() {
            if (!artCtx) return;
            artCtx.clearRect(0,0, DOM.canvas.width, DOM.canvas.height);
            artCtx.strokeStyle = 'rgba(255,176,0,0.5)'; artCtx.beginPath(); artCtx.moveTo(0, artState.groundY); artCtx.lineTo(DOM.canvas.width, artState.groundY); artCtx.stroke();
            artCtx.fillStyle = '#4af626'; artCtx.fillRect(artState.pX, artState.groundY - 15, 20, 15);
            artCtx.fillStyle = '#ff4444'; artCtx.fillRect(artState.targetX, artState.groundY - 15, 30, 15);
            artCtx.fillStyle = 'rgba(255,255,255,0.4)'; artCtx.fillRect(artState.targetX + 60, artState.groundY - 25, 40, 25); artCtx.fillRect(artState.targetX + 105, artState.groundY - 15, 20, 15);
        }

        function fireArtillery(angle, pYield) {
            playLaunch(); state.war.expenditure += 15; document.getElementById('dashExpenditure').textContent = `$${state.war.expenditure}B`;
            print("[WAR EXPENDITURE DEBITED: $15 BILLION]", 'danger');
            const v = pYield * 0.25; const rad = angle * Math.PI / 180;
            artState.proj = { x: artState.pX + 10, y: artState.groundY - 15, vx: v * Math.cos(rad), vy: v * Math.sin(rad), active: true, isPlayer: true };
            animateProjectile();
        }

        function animateProjectile() {
            if (!artCtx || !artState.proj.active) return;
            artState.proj.x += artState.proj.vx; artState.proj.y -= artState.proj.vy; artState.proj.vy -= 0.5; // Gravity
            drawArtilleryBase();
            artCtx.fillStyle = artState.proj.isPlayer ? '#ffb000' : '#ff4444';
            artCtx.beginPath(); artCtx.arc(artState.proj.x, artState.proj.y, 3, 0, Math.PI*2); artCtx.fill();

            if (artState.proj.y >= artState.groundY) { artState.proj.active = false; handleImpact(); } 
            else { artLoopId = requestAnimationFrame(animateProjectile); }
        }

        function handleImpact() {
            playExplosion(); if (!artCtx) return;
            artCtx.fillStyle = '#ffb000'; artCtx.beginPath(); artCtx.arc(artState.proj.x, artState.groundY, 20, 0, Math.PI*2); artCtx.fill();
            
            if (artState.proj.isPlayer) {
                let dist = Math.abs(artState.proj.x - (artState.targetX + 15));
                if (dist < 25) { print("GENERAL: DIRECT HIT! Target neutralized.", 'good'); state.war.enemyStrength -= 30; } 
                else if (artState.proj.x > artState.targetX + 50) {
                    print("GENERAL: OVERSHOOT. Ordnance impacted civilian sector.", 'danger'); print("MILTON: Congratulations, you just spent $15 Billion to blow up a hospital. The electorate is furious.", 'milton');
                    state.approval -= 4; state.war.tension += 15; queueNews("[GLOBAL] International outrage over collateral damage in recent strike.", 0); processTicker();
                } else { print("GENERAL: MISS. Ordnance fell short.", 'danger'); print("MILTON: You just burned $15 Billion to rearrange some sand, Mr. President. That deficit spending will hit the inflation gauge.", 'milton'); }

                updateDashboard();
                if (state.war.enemyStrength <= 0) { setTimeout(()=>endWar(true), 1500); return; }
                setTimeout(enemyFire, 1000);
            } else {
                let dist = Math.abs(artState.proj.x - (artState.pX + 10));
                if (dist < 30) {
                    print("GENERAL: BASE HIT! We are taking casualties!", 'danger'); print("MILTON: Taking fire. The electorate's stomach for these body bags is finite.", 'milton');
                    state.war.casualties += Math.floor(Math.random()*40 + 20); state.approval -= 3;
                } else { print("GENERAL: Enemy fire missed our position.", 'system'); }
                updateDashboard();
                if (state.war.tension >= 100) { playAlarm(true); setTimeout(() => { DOM.screen.style.backgroundColor = '#fff'; DOM.screen.innerHTML = '<div style="color:black; background:white; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:50px; font-weight:bold;">MUTUALLY ASSURED DESTRUCTION</div>'; }, 1000); return; }
                if (state.approval <= 15) { print("SYSTEM: WAR PROTESTS OVERWHELM CAPITAL. CONGRESS VOTES IMPEACHMENT.", 'danger'); return; }
                setTimeout(enableInput, 500);
            }
        }

        function enemyFire() {
            print("GENERAL: INCOMING! Enemy has acquired firing solution.", 'danger'); playLaunch();
            const d = (artState.targetX + 15) - (artState.pX + 10);
            let vReq = Math.sqrt(d * 0.5); vReq += (Math.random() - 0.5) * 5; 
            const rad = 135 * Math.PI / 180; 
            artState.proj = { x: artState.targetX, y: artState.groundY - 15, vx: vReq * Math.cos(rad), vy: vReq * Math.sin(rad), active: true, isPlayer: false };
            animateProjectile();
        }

        // --- MAIN INPUT PARSER ---
        function processInput() {
            let rawVal = DOM.cmd.value.trim().toLowerCase(); DOM.cmd.value = ''; DOM.visInput.textContent = '';
            if (!rawVal) return;
            DOM.inputLine.style.display = 'none'; DOM.cmd.disabled = true;

            if (rawVal === 'reset' || rawVal === 'rst') { location.reload(); return; }
            if (state.monthsToElection <= 0) { print("SYSTEM: SIMULATION OVER. TYPE 'RESET' TO RESTART.", 'danger'); enableInput(); return; }

            if (state.subMode === 'artillery') {
                if (rawVal === 'wd' || rawVal === 'withdraw') {
                    if (artLoopId) cancelAnimationFrame(artLoopId);
                    state.subMode = null; DOM.canvas.style.display = 'none'; updateDashboard();
                    print("GENERAL: Artillery mission aborted.", 'system'); enableInput(); return;
                }
                let parts = rawVal.split(' '); let angle = parseFloat(parts[0]); let pYield = parseFloat(parts[1]);
                if (isNaN(angle) || isNaN(pYield) || angle < 0 || angle > 90 || pYield < 1 || pYield > 100) {
                    print("SYSTEM: INVALID SOLUTION. FORMAT: [ANGLE 0-90] [YIELD 1-100]", 'danger'); enableInput(); return;
                }
                fireArtillery(angle, pYield); return;
            }

            if (rawVal === 'am' || rawVal === 'ask milton') {
                print(`${state.mode === 'war' ? 'COMMAND:~$' : (state.mode === 'dark' ? 'SHADOW:~$' : 'POTUS:~$')} ${rawVal}`, 'user-echo');
                if (state.mode === 'war') print("MILTON: Every airstrike is a hospital that won't be built. Every ground operation is a massive expansion of the state. Do not bankrupt the country for a sandbox war.", 'milton');
                else if (state.mode === 'dark') print("MILTON: You are attempting to artificially peg the price of truth. Just like currency, when you flood the market with counterfeit narratives, you trigger hyperinflation of doubt. You may survive the election, but you will bankrupt the social trust required to govern.", 'milton');
                else {
                    if (state.miltonAskedThisTurn) print("MILTON: I already gave you my analysis, boss. The ball is in your court.", 'milton');
                    else { print(crisisProfiles[state.currentCrisis].milton, 'milton'); state.miltonAskedThisTurn = true; }
                }
                enableInput(); return; 
            }

            let initialMode = state.mode;
            let dict = state.mode === 'war' ? warCommands : (state.mode === 'dark' ? darkCommands : macroCommands);
            let tokens = rawVal.replace(/ and /g, ',').split(',').map(t => t.trim()).filter(t => t.length > 0 && !/^[,\s]*$/.test(t));
            let activeCommands = []; let unrecognized = false;

            for (let token of tokens) {
                let found = false;
                for (let key in dict) {
                    if (key === token || dict[key].shortcut === token || dict[key].name.toLowerCase() === token) {
                        if (!activeCommands.includes(key)) activeCommands.push(key);
                        found = true; break;
                    }
                }
                if (!found) unrecognized = true;
            }

            if (unrecognized || activeCommands.length === 0) {
                print(`${state.mode === 'war' ? 'COMMAND:~$' : (state.mode === 'dark' ? 'SHADOW:~$' : 'POTUS:~$')} ${rawVal}`, 'user-echo');
                print("SYSTEM: Unrecognized directive found in package. Aborting to prevent execution errors.", 'danger');
                enableInput(); return;
            }

            let execNames = activeCommands.map(k => dict[k].name);
            print(`${state.mode === 'war' ? 'COMMAND:~$' : (state.mode === 'dark' ? 'SHADOW:~$' : 'POTUS:~$')} EXECUTE: [ ${execNames.join(' | ')} ]`, 'user-echo');
            let synergies = [];

            if (state.mode === 'macro') {
                if (!activeCommands.includes('pc')) state.hasPriceControls = false; 
                if (activeCommands.includes('rr') && activeCommands.includes('cr')) { activeCommands = activeCommands.filter(c => c !== 'rr' && c !== 'cr'); synergies.push("MILTON: Raising and cutting rates simultaneously? The Fed is paralyzed. Zero net monetary effect."); queueNews("[FED WATCH] Chaotic mixed signaling from Chairman paralyzes markets.", 0); }
                if (activeCommands.includes('ta') && activeCommands.includes('ft')) { activeCommands = activeCommands.filter(c => c !== 'ta' && c !== 'ft'); synergies.push("MILTON: Tariffs and free trade on the same day. Customs is ignoring you."); queueNews("[TRADE] Commerce Department issues conflicting directives.", 0); }
                if ((activeCommands.includes('is') || activeCommands.includes('ms')) && activeCommands.includes('cs')) { activeCommands = activeCommands.filter(c => c !== 'is' && c !== 'ms' && c !== 'cs'); synergies.push("MILTON: Massive spending combined with severe austerity? The treasury is deadlocked. Zero net fiscal effect."); }
                if ((activeCommands.includes('ms') || activeCommands.includes('is')) && activeCommands.includes('pc')) { synergies.push("MILTON: Stimulus combined with price controls... You've flooded the market with cash but made it illegal for prices to adjust. Prepare for catastrophic supply shortages."); state.gdp -= 3.0; state.approval -= 8; queueNews("[CRISIS] Severe shortages reported as demand vastly outstrips price-capped supply.", 1); }
            }

            if (state.mode === 'war') { if (activeCommands.includes('wd')) activeCommands = ['wd']; }
            if (state.mode === 'dark') {
                if (activeCommands.includes('ff') && activeCommands.includes('ce')) { synergies.push("CHIEF OF STAFF: Manufacturing a crisis and immediately censoring all dissenting questions. Brutally effective narrative lock, but society is cracking under the paranoia."); state.dark.narrative += 20; state.dark.paranoia += 30; }
                if (activeCommands.includes('ex')) activeCommands = ['ex'];
            }

            for (let syn of synergies) { if (syn.startsWith("GENERAL")) print(syn, 'general'); else if (syn.startsWith("CHIEF")) print(syn, 'chief'); else print(syn, 'milton'); }
            for (let key of activeCommands) dict[key].effect();
            
            processTicker(); 
            if (state.mode !== initialMode) { if (state.mode === 'war' || state.mode === 'dark') setTimeout(enableInput, 800); return; }
            if (state.subMode === 'artillery') return;

            if (state.mode === 'war') {
                if (state.war.enemyStrength > 0 && !activeCommands.includes('nk')) { state.war.casualties += Math.floor(Math.random()*30); state.approval -= 2; }
                updateDashboard();
                if (state.war.tension >= 100) { playAlarm(true); setTimeout(() => { DOM.screen.style.backgroundColor = '#fff'; DOM.screen.innerHTML = '<div style="color:black; background:white; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:50px; font-weight:bold;">MUTUALLY ASSURED DESTRUCTION</div>'; }, 1000); return; }
                if (state.war.enemyStrength <= 0) { setTimeout(()=>endWar(true), 1000); return; }
                if (state.approval <= 15) { print("SYSTEM: WAR PROTESTS OVERWHELM CAPITAL. CONGRESS VOTES IMPEACHMENT.", 'danger'); return; }
                setTimeout(enableInput, 500); return;
            }

            if (state.mode === 'dark') {
                state.dark.narrative = Math.max(0, state.dark.narrative - 5); state.dark.compliance = Math.max(0, state.dark.compliance - 2); 
                state.dark.narrative = Math.min(100, state.dark.narrative); state.dark.compliance = Math.min(100, state.dark.compliance); state.dark.paranoia = Math.min(100, state.dark.paranoia); state.dark.trust = Math.max(0, Math.min(100, state.dark.trust)); state.approval = Math.min(100, Math.max(0, state.approval));
                updateDashboard();
                if (state.dark.paranoia >= 90) { print("SYSTEM: PUBLIC PARANOIA CRITICAL. MASS CIVIL UNREST DETECTED.", 'danger'); state.approval -= 15; }
                if (state.dark.trust <= 10) { print("SYSTEM: INSTITUTIONAL TRUST EVAPORATED. DOLLAR LOSING RESERVE STATUS.", 'danger'); state.inflation += 2.0; queueNews("[GLOBAL] Investors dump dollar assets amid collapse of US institutional integrity.", 0); }
                if (state.approval <= 15) { print("SYSTEM: RIOTERS BREACH GATES. CONGRESS VOTES IMPEACHMENT.", 'danger'); return; }
                setTimeout(enableInput, 500); return;
            }

            if (state.tariffRate > 0) { let drag = state.tariffRate * 0.05; state.inflation += drag; state.gdp -= (drag * 0.5); }
            let drift = 0; if (state.inflation > 3.0) drift -= (state.inflation - 3.0) * 1.5; if (state.unemployment > 5.0) drift -= (state.unemployment - 5.0) * 1.5; if (state.gdp < 1.0) drift -= 2; if (state.inflation <= 2.5) drift += 2.5; if (state.unemployment <= 4.5) drift += 2.0; if (state.gdp >= 3.0) drift += 2.0; if (state.sp500 >= 5200) drift += 1.5; state.approval += drift;
            
            state.gdp = Math.max(-15, state.gdp); state.unemployment = Math.min(35, Math.max(2, state.unemployment)); state.inflation = Math.max(-3, state.inflation); state.approval = Math.min(100, Math.max(0, state.approval)); state.congress = Math.min(100, Math.max(0, state.congress)); state.fedCredibility = Math.min(100, Math.max(0, state.fedCredibility)); state.sp500 = Math.max(500, state.sp500);
            if (drift >= 4) print(`SYSTEM: Macro stabilization noted by electorate. Approval +${drift.toFixed(1)}%`);
            if (drift <= -4) print(`SYSTEM: Macro distress penalizing incumbent. Approval ${drift.toFixed(1)}%`, 'danger');

            updateDashboard();

            if (state.congress <= 15) { print("\nSYSTEM: IMPEACHMENT PASSED. EXECUTIVE REMOVED.", 'danger'); print("CHIEF OF STAFF: Pack your bags, sir. We're done.", 'chief'); print("\nSYSTEM: SIMULATION CONCLUDED. TYPE 'RESET' TO RESTART.", 'system'); enableInput(); return; }
            setTimeout(advanceTimeline, 800);
        }
        
        DOM.cmd.addEventListener('input', (e) => { DOM.visInput.textContent = e.target.value.toLowerCase(); });
        DOM.cmd.addEventListener('keydown', (e) => { if (e.key === 'Backspace' || e.key.length === 1) playClick(); if (e.key === 'Enter') processInput(); });
        DOM.cmd.addEventListener('blur', () => { if (state.isOn && !DOM.cmd.disabled) setTimeout(() => DOM.cmd.focus(), 10); });

        document.addEventListener('mouseover', (e) => {
            const target = e.target.closest('.hover-term'); if (!target || !state.isOn) return;
            const data = contextDict[target.getAttribute('data-term')];
            if(data) {
                let colorVar = state.mode === 'dark' ? 'var(--dark)' : (state.mode === 'war' ? 'var(--war)' : 'var(--phosphor)');
                DOM.dict.innerHTML = `<div class="context-title" style="color:${colorVar}; border-bottom-color:${colorVar}">${data.title}</div><div class="context-def">${data.def}</div><div class="context-hist">PRECEDENT: ${data.hist}</div>`;
            }
        });
        
        document.addEventListener('mouseout', (e) => {
            const target = e.target.closest('.hover-term'); if (!target || !state.isOn) return;
            DOM.dict.innerHTML = `<div class="context-title">INTELLIGENCE</div><div class="context-def">Hover over metrics to access structural definitions and precedents.</div>`;
        });

    </script>
</body>
