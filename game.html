<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESIDENTIAL TERMINAL - SYSTEM MILTON v4.1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #1a1a1a;
            font-family: 'Courier Prime', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            overflow: hidden;
        }
        
        .crt-monitor {
            width: 98vw;
            max-width: 1400px;
            height: 95vh;
            background: linear-gradient(145deg, #2a2a2a, #1f1f1f);
            border-radius: 35px;
            padding: 35px 35px 70px 35px;
            position: relative;
            box-shadow: 
                0 0 0 8px #4a4a4a,
                0 0 0 15px #2a2a2a,
                0 0 0 20px #3d3d3d,
                0 25px 60px rgba(0,0,0,0.7),
                inset -10px -10px 40px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
        }
        
        .crt-monitor::before {
            content: '';
            position: absolute;
            top: -35px; left: -35px; right: -35px; bottom: 15px;
            background: #6b5d4f;
            border-radius: 20px;
            padding: 8px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
            pointer-events: none;
        }
        
        .screen {
            background: #1a1a1a;
            border-radius: 5px;
            overflow: hidden;
            flex-grow: 1;
            position: relative;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
        }
        
        .screen-content {
            padding: 25px 30px;
            height: 100%;
            display: flex;
            flex-direction: column;
            color: #4af626;
            z-index: 15;
            position: relative;
        }
        
        .scanlines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                linear-gradient(to bottom, transparent 50%, rgba(74,246,38,0.03) 51%),
                repeating-linear-gradient(
                    to bottom,
                    transparent 0%,
                    transparent 2px,
                    rgba(74,246,38,0.02) 2px,
                    rgba(74,246,38,0.02) 4px
                );
            pointer-events: none;
            z-index: 20;
        }
        
        .phosphor-glow {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, rgba(74,246,38,0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 19;
        }
        
        .flicker {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(74,246,38,0.01);
            animation: flicker 0.15s infinite;
            pointer-events: none;
            z-index: 18;
        }
        
        @keyframes flicker {
            0% { opacity: 0.97; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }
        
        .header {
            font-size: 13px;
            margin-bottom: 12px;
            border-bottom: 2px solid #4af626;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            text-shadow: 0 0 5px rgba(74,246,38,0.5);
            flex-shrink: 0;
        }
        
        .status-line { 
            font-size: 11px; 
            margin-bottom: 15px; 
            color: #4af626; 
            opacity: 0.9;
            text-shadow: 0 0 3px rgba(74,246,38,0.5);
            flex-shrink: 0;
        }

        .main-display {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
            gap: 20px;
        }
        
        .message-area {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 15px;
        }
        
        .message-area::-webkit-scrollbar { width: 6px; }
        .message-area::-webkit-scrollbar-thumb { 
            background: rgba(74,246,38,0.3); 
            border-radius: 3px;
        }
        
        .msg { margin-bottom: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; padding-left: 10px; }
        .msg.system { color: #4af626; text-shadow: 0 0 8px rgba(74,246,38,0.6); }
        .msg.president { color: #ffcc00; text-shadow: 0 0 5px rgba(255,204,0,0.4); }
        .msg.warning { color: #ff9f43; text-shadow: 0 0 8px rgba(255,159,67,0.6); }
        .msg.danger { color: #ff6b6b; text-shadow: 0 0 8px rgba(255,107,107,0.6); }
        .msg.success { color: #4af626; font-weight: bold; text-shadow: 0 0 10px rgba(74,246,38,0.8); }
        .msg.atlas { color: #00ffff; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,255,0.8); border-left: 2px solid #00ffff; padding-left: 15px; }
        
        .sidebar {
            width: 320px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .dashboard {
            background: rgba(26,26,26,0.95);
            border: 1px solid #4af626;
            padding: 15px; 
            font-size: 11px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        
        .dash-header { 
            font-size: 12px; font-weight: bold; margin-bottom: 10px; color:#4af626; text-shadow: 0 0 5px rgba(74,246,38,0.6);
        }
        
        .dash-row { display: flex; justify-content: space-between; margin-bottom: 5px; padding: 4px 8px; border-radius: 3px; transition: background 0.3s; }
        .dash-row:hover { background: rgba(74,246,38,0.1); }
        
        .dash-label { color: #4af626; opacity: 0.9; text-shadow: 0 0 3px rgba(74,246,38,0.5); }
        .dash-value { color: #ffcc00; text-shadow: 0 0 5px rgba(255,204,0,0.5); }
        
        .atlas-section {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #00ffff;
        }
        .atlas-label { color: #00ffff; opacity: 0.9; text-shadow: 0 0 3px rgba(0,255,255,0.5); font-weight: bold; }
        .atlas-value { color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.8); font-weight: bold; }

        .info-panel {
            border: 1px dashed #4af626;
            padding: 10px;
            font-size: 10px;
            color: #4af626;
            opacity: 0.7;
            text-shadow: 0 0 3px rgba(74,246,38,0.5);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        
        .footer-controls {
            flex-shrink: 0;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .cmd-line {
            display: flex;
            align-items: center;
            padding-top: 10px;
            border-top: 1px dashed #4af626;
        }
        
        .prompt { 
            color: #ffcc00; 
            margin-right: 8px;
            text-shadow: 0 0 3px rgba(255,204,0,0.5);
            white-space: nowrap;
        }
        
        input[type="text"] {
            background: transparent;
            border: none;
            color: #4af626;
            font-family: 'Courier Prime', monospace;
            font-size: 13px;
            flex-grow: 1;
            outline: none;
            text-shadow: 0 0 8px rgba(74,246,38,0.6);
            text-transform: lowercase;
        }
        
        input[type="text"]:focus {
            background: rgba(74,246,38,0.05);
            border-radius: 3px;
            padding: 2px 5px;
        }
        
        input[type="text"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-cursor { display: inline-block; width: 8px; height: 16px; background: #4af626; animation: blink 0.8s infinite; vertical-align: middle; margin-left: 5px; }
        
        @keyframes blink { 
            0%, 50% { opacity: 1; } 
            51%, 100% { opacity: 0; } 
        }
        
        .power-btn {
            position: absolute; bottom: -45px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 70px; 
            background: linear-gradient(145deg, #3d3d3d, #2a2a2a);
            border-radius: 50%; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.1);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 200; 
            border: 3px solid #1a1a1a;
            transition: all 0.2s ease;
        }
        
        .power-btn:hover { 
            background: linear-gradient(145deg, #4a4a4a, #3d3d3d);
            box-shadow: 0 10px 25px rgba(0,0,0,0.6), inset 0 2px 8px rgba(255,255,255,0.15);
        }
        
        .power-btn:active { 
            transform: translateX(-50%) scale(0.95);
        }
        
        .power-icon { font-size: 32px; color: #ffcc00; text-shadow: 0 0 10px rgba(255,204,0,0.6); }
        
        .sound-toggle {
            position: absolute; top: 50px; left: 25px;
            background: rgba(74,246,38,0.1);
            border: 1px solid #4af626;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 9px;
            cursor: pointer;
            color: #4af626;
            z-index: 30;
        }

        .sound-toggle:hover { background: rgba(74,246,38,0.2); }
    </style>
</head>
<body>
    <div class="crt-monitor">
        <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">SOUND: ON</button>
        
        <div class="power-btn" id="powerBtn" onclick="startSystem()">
            <span class="power-icon">⏻</span>
        </div>
        
        <div class="screen">
            <div class="scanlines"></div>
            <div class="phosphor-glow"></div>
            <div class="flicker"></div>
            
            <div class="screen-content" onclick="focusInput()">
                <div class="header">
                    <span>PRESIDENTIAL TERMINAL // SYSTEM MILTON v4.1</span>
                    <span id="dateDisplay">DATE: Q1/2026</span>
                </div>
                
                <div class="status-line" id="statusLine">SYSTEM STANDBY - PRESS POWER BUTTON TO START</div>
                
                <div class="main-display">
                    <div class="message-area" id="msgArea"></div>
                    
                    <div class="sidebar">
                        <div class="dashboard" id="dashboard"></div>
                        <div class="info-panel" id="infoPanel" style="display: none;">
                            <div class="info-row">
                                <span id="turnIndicator">TURN: 1/12</span>
                            </div>
                            <div class="info-row">
                                <span>TYPE COMMANDS & PRESS ENTER</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="footer-controls">
                    <div class="cmd-line">
                        <span class="prompt">POTUS@WHITEHOUSE:~$</span>
                        <input type="text" id="cmd" placeholder="Enter command..." disabled autocomplete="off">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Game State encompassing core economic data + structural framework vectors
        const state = {
            turn: 1, maxTurns: 12, gdp: 4.2, unemployment: 3.8, inflation: 2.1,
            approval: 58, fedCredibility: 72, oilPrice: 75, sp500: 5850,
            uagIndex: 88, tollExtraction: 64, // ATLAS metrics
            typingSpeed: 75, systemOn: false, soundEnabled: true
        };

        const msgArea = document.getElementById('msgArea');
        const cmdInput = document.getElementById('cmd');
        const dashboard = document.getElementById('dashboard');
        const statusLine = document.getElementById('statusLine');
        const infoPanel = document.getElementById('infoPanel');
        
        // --- ADVANCED AUDIO ENGINE ---
        let audioCtx;
        let noiseBuffer;
        let humOscillator;

        function initAudio() {
            if (!audioCtx && state.soundEnabled) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    generateNoiseBuffer();
                } catch(e) {
                    console.error('Web Audio API error:', e);
                    toggleSound(false);
                }
            }
        }

        function generateNoiseBuffer() {
            const bufferSize = audioCtx.sampleRate * 2; 
            noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }
        }

        function playHum() {
            if (!audioCtx || !state.soundEnabled || humOscillator) return;
            humOscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            humOscillator.type = 'sine';
            humOscillator.frequency.value = 60; 
            gainNode.gain.value = 0.015;
            humOscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            humOscillator.start();
        }

        function stopHum() {
            if (humOscillator) {
                humOscillator.stop();
                humOscillator.disconnect();
                humOscillator = null;
            }
        }

        // Extremely short, zero-latency mechanical click for user typing
        function playKeyClick() {
            if (!state.soundEnabled || !audioCtx || !noiseBuffer) return;
            const source = audioCtx.createBufferSource();
            source.buffer = noiseBuffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 3000;
            const gain = audioCtx.createGain();
            
            // 15ms total envelope prevents event-loop smearing
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.015);
            
            source.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            source.start();
            source.stop(audioCtx.currentTime + 0.02);
        }

        // Tighter teletype sound for system logging
        function playTeletype() {
            if (!state.soundEnabled || !audioCtx || !noiseBuffer) return;
            const source = audioCtx.createBufferSource();
            source.buffer = noiseBuffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.value = 4000;
            const gain = audioCtx.createGain();
            
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.01);
            
            source.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            source.start();
            source.stop(audioCtx.currentTime + 0.015);
        }

        function playHDDSeek() {
            if (!state.soundEnabled || !audioCtx || !noiseBuffer) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.02);
            osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.04);
            osc.frequency.linearRampToValueAtTime(1500, audioCtx.currentTime + 0.06);
            
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        }

        function playErrorSound() {
            if (!state.soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function playSuccessSound() {
            if (!state.soundEnabled || !audioCtx) return;
            const notes = [440, 554, 659];
            notes.forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'square';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                }, i * 80);
            });
        }

        // --- COMMAND PARSING & LOGIC ---

        const commandEffects = {
            'cut rates': { msg: 'INTEREST RATES CUT BY 0.25%. LIQUIDITY INJECTED.', gdp: 0.35, approval: 2, inflation: 0.28, sp500: 280, uagIndex: 2, tollExtraction: 4 },
            'increase spending': { msg: 'INFRASTRUCTURE SPENDING +$50B. CONTRACTS AWARDED.', gdp: 0.4, unemployment: -0.12, inflation: 0.6, sp500: 150, tollExtraction: 6 },
            'massive stimulus': { msg: 'MASSIVE PRE-ELECTION STIMULUS. MONEY SUPPLY EXPANDED.', gdp: 0.7, unemployment: -0.2, inflation: 0.9, sp500: 450, uagIndex: 8, tollExtraction: 12 },
            'suppress wages': { msg: 'WAGE GROWTH ARTIFICIALLY RESTRAINED.', inflation: -0.35, unemployment: 0.4, sp500: 80, tollExtraction: 5 },
            'wage controls': { msg: 'EXECUTIVE WAGE CAPS ENFORCED. MARKET DISTORTED.', inflation: -0.4, unemployment: 0.5, approval: -2, sp500: -350, uagIndex: 12 },
            'tariffs': { msg: 'NEW TARIFFS IMPOSED. SUPPLY CHAINS REROUTED.', inflation: 0.5, gdp: -0.3, oilPrice: 4, sp500: -200, uagIndex: 5 },
            'escalate trade war': { msg: 'FULL TRADE WAR DECLARED.', inflation: 0.7, gdp: -0.5, oilPrice: 12, sp500: -500, tollExtraction: 8 },
            'pressure fed': { msg: 'EXECUTIVE BRANCH PRESSURES CENTRAL BANK.', approval: 3.2, fedCredibility: -9.5, sp500: 100, uagIndex: 4 },
            'cut spending': { msg: 'GOVERNMENT SPENDING SEVERELY CUT. DEFICIT COOLED.', inflation: -0.4, gdp: -0.3, sp500: -180, tollExtraction: -5 },
            'price controls': { msg: 'COMPREHENSIVE PRICE CONTROLS IMPOSED.', inflation: -0.6, gdp: -0.8, sp500: -600, uagIndex: 20 },
            'audit federal reserve': { msg: 'FULL CONGRESSIONAL AUDIT OF THE FEDERAL RESERVE INITIATED.', fedCredibility: 5, sp500: -400, uagIndex: -15, tollExtraction: -12, type: 'atlas' },
            'federal independence': { msg: 'FEDERAL POLICY INDEPENDENCE DECLARED. ALGORITHMIC TIES SEVERED.', fedCredibility: 10, approval: -3, sp500: -250, uagIndex: -12, tollExtraction: -8 },
            'decentralize grid': { msg: 'LOCALIZED POWER AND DATA SOVEREIGNTY SUBSIDIZED.', gdp: 0.1, sp500: -100, uagIndex: -20, tollExtraction: -15, type: 'atlas' },
            'dismantle algorithmic governance': { msg: 'EXECUTIVE ORDER: CORPORATE UNIFIED ALGORITHMIC GOVERNANCE ILLEGAL.', gdp: -0.4, approval: 8, sp500: -850, uagIndex: -35, tollExtraction: -25, type: 'atlas' },
            'do nothing': { msg: 'NO INTERVENTION. MARKETS LEFT TO NATURALLY CORRECT.', sp500: 50, uagIndex: -2, tollExtraction: -1 }
        };

        function focusInput() {
            if (state.systemOn && !cmdInput.disabled) {
                if (state.soundEnabled) initAudio();
                cmdInput.focus();
            }
        }

        async function bootSequence() {
            const oldSpeed = state.typingSpeed;
            state.typingSpeed = 45;
            const messages = [
                'SYSTEM MILTON v4.1 BOOT SEQUENCE INITIATED',
                '',
                'CHECKING HARDWARE... 128GB RAM OK',
                'LOADING APPLE SILICON KERNEL... OK', 
                'MOUNTING LOCAL AI INFRASTRUCTURE... MSTY MIGRATION DETECTED',
                'VERIFYING SECURE AIRGAP... ENCRYPTED',
                'INITIALIZING ATLAS STRUCTURAL VECTORS...',
                'CALIBRATING TOLL BOOTH EXTRACTION METRICS...',
                'CONNECTING TO EQUITIES FEED...',
                '',
                'SYSTEM READY.'
            ];
            
            for (let msg of messages) {
                if (!state.systemOn) break;
                if (state.soundEnabled) playHDDSeek();
                await addMessage(msg, 'system');
                await new Promise(r => setTimeout(r, 80)); 
            }
            
            state.typingSpeed = oldSpeed;
            cmdInput.disabled = false;
            infoPanel.style.display = 'block';
            buildDashboard();
            focusInput();
        }

        async function startSystem() {
            const powerBtn = document.getElementById('powerBtn');
            if (state.systemOn || !powerBtn) return;
            
            state.systemOn = true;
            statusLine.textContent = 'CONNECTED TO SECURE TERMINAL [AIRGAPPED]';
            
            initAudio();
            playHum();
            playSuccessSound();
            
            powerBtn.style.opacity = '0.5';
            powerBtn.style.pointerEvents = 'none';
            
            await bootSequence();
            
            const tutorialMsg = `
====================================================
        TUTORIAL - STRUCTURAL OVERVIEW
====================================================

YOU ARE THE EXECUTIVE. I AM MILTON.
THIS SYSTEM MAPS POLICY TO STRUCTURAL INCENTIVES.

MONITOR THE DASHBOARD. BEYOND STANDARD METRICS,
YOU MUST NOW TRACK STRUCTURAL PARASITISM:

  • S&P 500: The market enforcement mechanism. 
    Threatening monopolies will cause massive dumps.
  • UAG INDEX: Unified Algorithmic Governance. The
    degree to which institutional predictive models 
    control citizen behavior. (LOWER IS BETTER)
  • TOLL EXTRACTION: The percentage of economic 
    velocity captured by corporate rent-seeking. 
    (LOWER IS BETTER)

COMMANDS AVAILABLE:
${Object.keys(commandEffects).join(', ').toUpperCase()}

TYPE ANY COMMAND AND PRESS ENTER TO EXECUTE.
====================================================`;
            
            await addMessage(tutorialMsg, 'system');
        }

        function toggleSound(forceState) {
            state.soundEnabled = forceState !== undefined ? forceState : !state.soundEnabled;
            const btn = document.getElementById('soundToggle');
            if (btn) btn.textContent = `SOUND: ${state.soundEnabled ? 'ON' : 'OFF'}`;
            if (state.soundEnabled && state.systemOn) {
                initAudio();
                playHum();
            } else {
                stopHum();
            }
        }

        async function addMessage(text, type = 'system') {
            if (!state.systemOn) return;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${type}`;
            msgArea.appendChild(msgDiv);
            
            let i = 0;
            return new Promise(resolve => {
                const typeInterval = setInterval(() => {
                    if (!state.systemOn) { clearInterval(typeInterval); resolve(); return; }
                    
                    msgDiv.textContent += text.charAt(i);
                    msgArea.scrollTop = msgArea.scrollHeight;
                    i++;
                    
                    if (state.soundEnabled && type === 'system' && i % 2 === 0) playTeletype();
                    
                    if (i >= text.length || !state.systemOn) {
                        clearInterval(typeInterval);
                        while (msgArea.children.length > 50) { msgArea.removeChild(msgArea.firstChild); }
                        resolve();
                    }
                }, 1000 / state.typingSpeed);
            });
        }

        function buildDashboard() {
            if (!state.systemOn) return;
            const gdpColor = state.gdp < 1.5 ? '#ff6b6b' : state.gdp > 3.0 ? '#4af626' : '#ffcc00';
            const unempColor = state.unemployment > 5.0 ? '#ff6b6b' : state.unemployment < 3.5 ? '#ffcc00' : '#4af626';
            const infColor = state.inflation > 3.0 ? '#ff6b6b' : state.inflation < 1.5 ? '#4af626' : '#ffcc00';
            const spColor = state.sp500 >= 5850 ? '#4af626' : (state.sp500 < 5000 ? '#ff6b6b' : '#ffcc00');
            const uagColor = state.uagIndex > 80 ? '#ff6b6b' : state.uagIndex < 50 ? '#00ffff' : '#ffcc00';
            const tollColor = state.tollExtraction > 70 ? '#ff6b6b' : state.tollExtraction < 40 ? '#00ffff' : '#ffcc00';
            
            dashboard.innerHTML = `
                <div class="dash-header">ECONOMIC DASHBOARD</div>
                <div class="dash-row"><span class="dash-label">GDP GROWTH:</span><span class="dash-value" style="color:${gdpColor}">${state.gdp.toFixed(1)}%</span></div>
                <div class="dash-row"><span class="dash-label">UNEMPLOYMENT:</span><span class="dash-value" style="color:${unempColor}">${state.unemployment.toFixed(1)}%</span></div>
                <div class="dash-row"><span class="dash-label">INFLATION (PCE):</span><span class="dash-value" style="color:${infColor}">${state.inflation.toFixed(1)}%</span></div>
                <div class="dash-row"><span class="dash-label">S&P 500:</span><span class="dash-value" style="color:${spColor}">${Math.round(state.sp500).toLocaleString()}</span></div>
                <div class="dash-row"><span class="dash-label">APPROVAL RATING:</span><span class="dash-value" style="color:#ffcc00">${Math.round(state.approval)}%</span></div>
                <div class="dash-row"><span class="dash-label">FED CREDIBILITY:</span><span class="dash-value">${Math.round(state.fedCredibility)}%</span></div>
                
                <div class="dash-row atlas-section">
                    <span class="atlas-label">UAG INDEX:</span>
                    <span class="atlas-value" style="color:${uagColor}">${Math.round(state.uagIndex)}/100</span>
                </div>
                <div class="dash-row">
                    <span class="atlas-label">TOLL EXTRACTION:</span>
                    <span class="atlas-value" style="color:${tollColor}">${Math.round(state.tollExtraction)}%</span>
                </div>
            `;
        }

        async function processCommand(cmd) {
            if (!state.systemOn || !cmdInput.value.trim() || cmdInput.disabled) return;
            
            cmdInput.disabled = true; 
            cmd = cmd.toLowerCase().trim();
            
            // Instantly render the user's command to eliminate perceived input lag
            const userMsg = document.createElement('div');
            userMsg.className = 'msg president';
            userMsg.textContent = `POTUS@WHITEHOUSE:~$ ${cmd}`;
            msgArea.appendChild(userMsg);
            msgArea.scrollTop = msgArea.scrollHeight;
            
            cmdInput.value = '';
            
            let effect = commandEffects[cmd];
            
            if (!effect) {
                playErrorSound();
                await addMessage(`COMMAND NOT RECOGNIZED. TYPE "HELP" FOR LIST.`, 'warning');
                cmdInput.disabled = false;
                focusInput();
                return;
            }
            
            if (state.soundEnabled) {
                for(let k=0; k<3; k++) setTimeout(playHDDSeek, k*100);
            }
            await new Promise(r => setTimeout(r, 400)); // processing delay
            
            state.gdp += (effect.gdp || 0);
            state.unemployment += (effect.unemployment || 0);
            state.inflation += (effect.inflation || 0);
            state.approval += (effect.approval || 0);
            state.fedCredibility += (effect.fedCredibility || 0);
            state.oilPrice += (effect.oilPrice || 0);
            state.sp500 += (effect.sp500 || 0);
            state.uagIndex += (effect.uagIndex || 0);
            state.tollExtraction += (effect.tollExtraction || 0);
            
            // Clamps
            state.gdp = Math.max(-5, state.gdp);
            state.unemployment = Math.min(20, Math.max(1, state.unemployment));
            state.inflation = Math.min(15, Math.max(-2, state.inflation));
            state.approval = Math.min(100, Math.max(0, state.approval));
            state.fedCredibility = Math.min(100, Math.max(0, state.fedCredibility));
            state.sp500 = Math.max(1500, state.sp500);
            state.uagIndex = Math.min(100, Math.max(0, state.uagIndex));
            state.tollExtraction = Math.min(95, Math.max(5, state.tollExtraction));
            
            const msgType = effect.type === 'atlas' ? 'atlas' : 'system';
            if (effect.msg) await addMessage(effect.msg, msgType);
            
            let warnings = [];
            
            if (state.inflation > 3.0 && state.turn > 2) {
                const pain = Math.max(1, (state.inflation - 3.0) * 2);
                state.approval -= pain;
                warnings.push(`⚠️ INFLATION > 3%. VOTER PURCHASING POWER DEGRADED (-${pain.toFixed(1)}% APP).`);
            }
            
            if (state.sp500 < 5000) {
                warnings.push(`📉 MARKET PANIC: EQUITIES IN FREEFALL. INSTITUTIONAL WEALTH DESTROYED.`);
            }

            if (state.uagIndex > 90) {
                warnings.push(`🚨 CRITICAL: ALGORITHMIC CAPTURE IMMINENT. SOVEREIGNTY COMPROMISED.`);
                state.approval -= 3; 
            }
            if (state.tollExtraction > 80) {
                warnings.push(`⚠️ WARNING: EXCESSIVE RENT-SEEKING DETECTED. ECONOMIC VELOCITY STALLING.`);
                state.gdp -= 0.5;
            }
            
            for (let warn of warnings) await addMessage(warn, 'warning');
            
            state.turn++;
            const qtr = Math.ceil(state.turn/2);
            document.getElementById('dateDisplay').textContent = `DATE: Q${qtr}/2026`;
            document.getElementById('turnIndicator').textContent = `TURN: ${state.turn}/${state.maxTurns}`;
            
            if (state.turn > 12) { 
                await endGame(); 
            } else {
                cmdInput.disabled = false;
                focusInput();
            }
            
            buildDashboard();
        }

        async function endGame() {
            let verdict = ''; let type = 'neutral';
            
            if (state.uagIndex < 50 && state.tollExtraction < 45) {
                verdict = 'ATLAS DIRECTIVE ACHIEVED. STRUCTURAL SOVEREIGNTY RESTORED.';
                type = 'atlas';
                playSuccessSound();
            } else if (state.approval >= 55 && state.inflation <= 3.0) { 
                verdict = 'RE-ELECTION WIN. STATUS QUO MAINTAINED.'; 
                type = 'success';
                playSuccessSound();
            } else if (state.uagIndex >= 95 || state.fedCredibility < 30) { 
                verdict = 'SYSTEMIC CAPTURE. EXECUTIVE AUTHORITY SUPPLANTED BY ALGORITHM.'; 
                type = 'danger';
                playErrorSound();
            } else { 
                verdict = 'DEFEAT. POOR STRUCTURAL MANAGEMENT.'; 
                type = 'danger';
                playErrorSound();
            }
            
            const finalMsg = `\n=====================================\n${verdict.toUpperCase()}\n=====================================\n
FINAL METRICS:
GDP: ${state.gdp.toFixed(1)}% | UNEMP: ${state.unemployment.toFixed(1)}% | INF: ${state.inflation.toFixed(1)}%
S&P 500: ${Math.round(state.sp500).toLocaleString()}
UAG INDEX: ${Math.round(state.uagIndex)}/100
TOLL EXTRACTION: ${Math.round(state.tollExtraction)}%

TERMINAL DISCONNECTED.`;
            
            await addMessage(finalMsg, type === 'success' || type === 'atlas' ? 'success' : 'danger');
            cmdInput.disabled = true;
            statusLine.textContent = 'SYSTEM SHUTDOWN - PRESS POWER BUTTON TO RESTART';
            stopHum();
        }

        async function resetGame() {
            state.turn = 1; state.gdp = 4.2; state.unemployment = 3.8; state.inflation = 2.1; 
            state.approval = 58; state.fedCredibility = 72; state.oilPrice = 75; state.sp500 = 5850;
            state.uagIndex = 88; state.tollExtraction = 64;
            
            msgArea.innerHTML = '';
            document.getElementById('dateDisplay').textContent = 'DATE: Q1/2026';
            document.getElementById('turnIndicator').textContent = 'TURN: 1/12';
            statusLine.textContent = 'SYSTEM READY FOR NEW SESSION - PRESS POWER TO START';
            
            playSuccessSound();
            if(state.soundEnabled) playHum();
        }

        async function showHelp() {
            let commandText = '';
            for (const [cmd, data] of Object.entries(commandEffects)) {
                commandText += `\n  ${cmd.toUpperCase()}`;
            }
            const helpMsg = `AVAILABLE DIRECTIVES:${commandText}\n\nTYPE DIRECTIVE EXACTLY AS SHOWN.\nUSE "RESET" TO RESTART SIMULATION.`;
            await addMessage(helpMsg, 'system');
        }

        document.addEventListener('DOMContentLoaded', () => {
            cmdInput.addEventListener('keydown', async (e) => {
                if (!state.systemOn || cmdInput.disabled) return;
                
                // Actual mechanical keyboard sound on key down
                if (e.key.length === 1 || e.key === 'Backspace') {
                    playKeyClick();
                }

                if (e.key === 'Enter') {
                    e.preventDefault();
                    playKeyClick();
                    const val = cmdInput.value.trim().toLowerCase();
                    
                    if (val === 'help' || val === '?') {
                        cmdInput.disabled = true;
                        cmdInput.value = '';
                        await showHelp();
                        cmdInput.disabled = false;
                        focusInput();
                        return;
                    }
                    
                    if (val === 'reset') {
                        cmdInput.disabled = true;
                        cmdInput.value = '';
                        await addMessage('RESETTING SYSTEM...', 'warning');
                        setTimeout(() => { resetGame(); cmdInput.disabled = false; focusInput(); }, 1000);
                        return;
                    }
                    
                    await processCommand(val);
                }
            });
            
            cmdInput.addEventListener('focus', () => {
                const existingCursor = document.getElementById('cursorIndicator');
                if (!existingCursor) {
                    const cursor = document.createElement('div');
                    cursor.className = 'typing-cursor';
                    cursor.id = 'cursorIndicator';
                    document.querySelector('.prompt').appendChild(cursor);
                }
            });
            
            cmdInput.addEventListener('blur', () => {
                const cursor = document.getElementById('cursorIndicator');
                if (cursor) cursor.remove();
            });
        });
    </script>
</body>
</html>
