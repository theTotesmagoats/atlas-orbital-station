<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESIDENTIAL TERMINAL - MILTON v8.5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        :root {
            --phosphor: #ffb000; /* Deep Amber */
            --milton: #e8e8e8;   /* Phosphor White for clarity */
            --bg: #0a0600;
            --dim: rgba(255, 176, 0, 0.3);
            --danger: #ff3300;
            --war: #ff4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 2vw;
            overflow: hidden;
            font-size: 24px;
            color: var(--phosphor);
            letter-spacing: 1px;
        }

        .hardware-bezel {
            width: 100%;
            max-width: 1600px;
            height: 100%;
            background: #111;
            border-radius: 12px;
            padding: 20px;
            box-shadow: inset 0 0 20px #000, 0 0 50px #000;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .crt-screen {
            background: var(--bg);
            flex-grow: 1;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            display: flex;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
            opacity: 0; 
            transition: opacity 0.1s, background-color 0.5s;
        }
        .crt-screen.on { opacity: 1; }
        .crt-screen.war-mode { background: #1a0500; } /* Deep red tint during war */

        .scanlines {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 50;
        }
        
        .glow {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(255,176,0,0.02) 0%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 49;
        }

        .system-grid {
            display: grid;
            grid-template-columns: 1fr 420px;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 10;
        }

        .terminal-area {
            display: flex;
            flex-direction: column;
            padding: 30px;
            height: 100%;
            border-right: 2px solid var(--dim);
            cursor: text; 
        }

        .log-output {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-bottom: 20px;
        }
        .log-output::-webkit-scrollbar { display: none; }
        .log-output { -ms-overflow-style: none; scrollbar-width: none; }

        .block { margin-bottom: 18px; line-height: 1.3; white-space: pre-wrap; text-shadow: 0 0 2px var(--phosphor); }
        .block.system { opacity: 0.8; }
        .block.chief { font-weight: bold; color: var(--phosphor); border-left: 3px solid var(--phosphor); padding-left: 15px; }
        /* Milton is now stark white to cut through the noise */
        .block.milton { color: var(--milton); font-style: italic; border-left: 3px solid var(--milton); padding-left: 15px; text-shadow: 0 0 3px var(--milton); }
        .block.danger { color: var(--danger); text-shadow: 0 0 3px var(--danger); font-weight: bold; }
        .block.general { color: var(--war); text-shadow: 0 0 3px var(--war); border-left: 3px solid var(--war); padding-left: 15px; font-weight: bold; }
        .block.user-echo { font-weight: bold; opacity: 0.9; }

        .input-line {
            display: flex;
            align-items: center;
            margin-top: auto;
            flex-shrink: 0;
            display: none; 
        }

        .prompt { margin-right: 10px; text-shadow: 0 0 2px var(--phosphor); font-weight: bold; }
        #visualInput { white-space: pre; text-transform: lowercase; text-shadow: 0 0 2px var(--phosphor); }

        .cursor {
            display: inline-block; width: 14px; height: 24px;
            background: var(--phosphor); animation: blink 1s step-end infinite;
            margin-left: 2px; vertical-align: text-bottom; box-shadow: 0 0 3px var(--phosphor);
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        #cmd { position: absolute; opacity: 0; left: -9999px; pointer-events: none; }

        .dashboard-area {
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            background: rgba(10, 6, 0, 0.4);
            cursor: default;
        }

        .panel {
            border: 2px solid var(--phosphor);
            padding: 15px 20px;
            box-shadow: inset 0 0 15px var(--dim);
            transition: border-color 0.3s;
        }
        .panel.war-mode { border-color: var(--war); box-shadow: inset 0 0 20px rgba(255, 68, 68, 0.2); }

        .panel-title {
            text-align: center; border-bottom: 2px solid var(--dim);
            padding-bottom: 8px; margin-bottom: 15px; letter-spacing: 2px; font-weight: bold;
        }

        .metric-row { display: flex; justify-content: space-between; margin-bottom: 10px; cursor: help; }
        .metric-row:hover { background: var(--dim); }
        .metric-label { opacity: 0.8; text-shadow: 0 0 2px var(--phosphor); }
        .metric-value { font-weight: bold; text-shadow: 0 0 2px var(--phosphor); }
        .metric-value.warning { color: var(--danger); text-shadow: 0 0 3px var(--danger); }
        .metric-value.good { color: #4af626; text-shadow: 0 0 3px #4af626; }

        .dict-box {
            flex-grow: 1; border: 1px solid var(--dim); padding: 20px;
            font-size: 20px; line-height: 1.4; background: rgba(255, 176, 0, 0.05);
            display: flex; flex-direction: column;
        }
        
        .context-title {
            font-weight: bold; font-size: 22px; margin-bottom: 10px;
            border-bottom: 1px solid var(--phosphor); padding-bottom: 8px;
            text-shadow: 0 0 2px var(--phosphor);
        }
        .context-def { margin-bottom: 12px; line-height: 1.5; text-shadow: 0 0 1px var(--phosphor); }
        .context-hist { font-style: italic; opacity: 0.9; line-height: 1.5; border-left: 2px solid var(--phosphor); padding-left: 10px; text-shadow: 0 0 1px var(--phosphor); color: var(--milton); }

        .cmd-list {
            margin-top: auto; font-size: 20px; opacity: 0.9;
            border-top: 2px dashed var(--dim); padding-top: 15px; text-shadow: 0 0 2px var(--phosphor);
        }
        .cmd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .cmd-item { font-size: 18px; }
        .cmd-item.highlight { border: 1px solid var(--milton); color: var(--milton); padding: 4px 5px; border-radius: 3px; text-shadow: 0 0 3px var(--milton);}
        .cmd-item.war-highlight { border: 1px solid var(--war); color: var(--war); }

        .hardware-controls { position: absolute; bottom: 25px; right: 35px; display: flex; gap: 20px; z-index: 100; }
        .hw-btn {
            width: 48px; height: 48px; background: #2a2a2a; border: 2px solid #000; border-radius: 50%;
            cursor: pointer; box-shadow: 0 5px 0 #000, inset 0 2px 5px rgba(255,255,255,0.1);
            display: flex; justify-content: center; align-items: center; color: #111; 
            font-family: sans-serif; text-shadow: 1px 1px 0 rgba(255,255,255,0.15); transition: all 0.1s; position: relative;
        }
        .hw-btn:hover { background: #333; }
        .hw-btn:active { transform: translateY(5px); box-shadow: 0 0 0 #000, inset 0 2px 5px rgba(255,255,255,0.1); }
        .hw-icon { font-size: 22px; } .hw-icon.power { font-size: 26px; }
        .hw-led {
            width: 10px; height: 10px; border-radius: 50%; position: absolute; top: -18px; left: 17px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
        }
        .hw-led.amber { background: #331a00; } .hw-led.amber.on { background: #ffaa00; box-shadow: 0 0 12px #ffaa00, inset 0 1px 2px rgba(255,255,255,0.5); }
        .hw-led.green { background: #003300; } .hw-led.green.on { background: #4af626; box-shadow: 0 0 12px #4af626, inset 0 1px 2px rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <div class="hardware-bezel">
        <div class="hardware-controls">
            <div class="hw-btn" onclick="toggleSound()" title="TOGGLE SOUND">
                <div class="hw-led green on" id="soundLed"></div><div class="hw-icon">🔊</div>
            </div>
            <div class="hw-btn" onclick="togglePower()" title="POWER">
                <div class="hw-led amber" id="powerLed"></div><div class="hw-icon power">⏻</div>
            </div>
        </div>
        
        <div class="crt-screen" id="screen">
            <div class="scanlines"></div>
            <div class="glow"></div>
            <div class="flicker"></div>
            
            <div class="system-grid">
                
                <div class="terminal-area" onclick="focusTerminal()">
                    <div class="log-output" id="logOutput"></div>
                    
                    <div class="input-line" id="inputLine">
                        <span class="prompt" id="promptText">POTUS:~$</span>
                        <span id="visualInput"></span><div class="cursor" id="cursorIndicator"></div>
                        <input type="text" id="cmd" autocomplete="off" spellcheck="false" maxlength="25">
                    </div>
                </div>

                <div class="dashboard-area" id="dashboardArea" style="visibility:hidden;">
                    <div class="panel" id="telemetryPanel">
                        </div>

                    <div class="dict-box" id="dictBox">
                        <div class="context-title">INTELLIGENCE</div>
                        <div class="context-def">Hover over metrics to access structural definitions and behavioral precedents.</div>
                    </div>

                    <div class="cmd-list" id="cmdListArea">
                        </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // --- CORE STATE ---
        const state = {
            isOn: false, soundEnabled: true,
            mode: 'macro', // 'macro' or 'war'
            turn: 1, maxTurns: 12, 
            gdp: 2.1, unemployment: 5.1, inflation: 4.8,
            approval: 48, fedCredibility: 80, sp500: 4800, congress: 55, tariffRate: 5.0,
            hasPriceControls: false, currentCrisis: '', miltonAskedThisTurn: false,
            // War State
            war: { enemyStrength: 100, tension: 50, casualties: 0, expenditure: 0, active: false }
        };

        const DOM = {
            screen: document.getElementById('screen'), pLed: document.getElementById('powerLed'), sLed: document.getElementById('soundLed'),
            log: document.getElementById('logOutput'), inputLine: document.getElementById('inputLine'), cmd: document.getElementById('cmd'),
            visInput: document.getElementById('visualInput'), dash: document.getElementById('dashboardArea'),
            telemetry: document.getElementById('telemetryPanel'), cmdList: document.getElementById('cmdListArea'),
            dict: document.getElementById('dictBox'), prompt: document.getElementById('promptText')
        };

        // --- DICTIONARY ---
        const contextDict = {
            'election': { title: "ELECTION COUNTDOWN", def: "The ultimate accountability mechanism.", hist: "Voters punish structural reality if it causes immediate pain." },
            'gdp': { title: "GROSS DOMESTIC PRODUCT", def: "Total market value. True growth requires productivity, not just money printing.", hist: "Excessive stimulus causes short-term GDP spikes followed by stagflation." },
            'unemployment': { title: "UNEMPLOYMENT RATE", def: "A natural rate exists. Trying to force it to zero via stimulus creates runaway inflation.", hist: "The Phillips Curve tradeoff is a short-term illusion." },
            'inflation': { title: "INFLATION (PCE)", def: "Taxation without legislation. Driven by government expansion of the money supply.", hist: "Requires brutal interest rate hikes to break the psychological loop." },
            'sp500': { title: "S&P 500 INDEX", def: "Equity valuations. Highly addicted to cheap debt.", hist: "Wall Street routinely threatens crash scenarios to force the Fed to cut rates." },
            'approval': { title: "APPROVAL RATING", def: "Political capital. Dropping below 40% makes you a lame duck.", hist: "Doing the right economic thing usually costs you re-election." },
            'congress': { title: "CONGRESSIONAL APP", def: "Legislative tolerance.", hist: "Falls below 15% guarantee impeachment." },
            'tariffs': { title: "AVERAGE TARIFF RATE", def: "A direct tax on domestic consumers.", hist: "Smoot-Hawley (1930) worsened the Great Depression by killing global trade." },
            // War Dictionary
            'strength': { title: "ENEMY STRENGTH", def: "Remaining combat capacity of the hostile force.", hist: "Reaching 0% signifies theater victory." },
            'tension': { title: "THEATER TENSION", def: "The likelihood of a global escalation or nuclear exchange.", hist: "Reaching 100% triggers Mutually Assured Destruction." },
            'casualties': { title: "CASUALTIES", def: "American lives lost. Drags heavily on domestic approval.", hist: "Prolonged kinetic engagements destroy incumbent administrations." },
            'expenditure': { title: "WAR EXPENDITURE", def: "Billions of dollars burned. Will hit the macro economy as severe inflation and GDP drag upon return.", hist: "War is the ultimate destroyer of economic capital." }
        };

        // --- COMMANDS ---
        const macroCommands = {
            'rr': { name: 'RAISE RATES', effect: () => { state.gdp-=0.6; state.inflation-=0.8; state.unemployment+=0.5; state.sp500-=300; state.fedCredibility+=5; state.approval-=3; state.congress+=2; } },
            'cr': { name: 'CUT RATES', effect: () => { state.gdp+=0.5; state.inflation+=0.7; state.unemployment-=0.3; state.sp500+=400; state.fedCredibility-=6; state.approval+=3; } },
            'is': { name: 'INCREASE SPENDING', effect: () => { state.gdp+=0.4; state.inflation+=0.5; state.unemployment-=0.2; state.sp500+=150; state.approval+=2; state.congress+=5; } },
            'cs': { name: 'CUT SPENDING', effect: () => { state.gdp-=0.4; state.inflation-=0.3; state.unemployment+=0.3; state.sp500-=100; state.approval-=4; state.congress-=5; } },
            'ms': { name: 'MASSIVE STIMULUS', effect: () => { state.gdp+=0.8; state.inflation+=1.5; state.unemployment-=0.6; state.sp500+=600; state.fedCredibility-=10; state.approval+=5; state.congress+=10; } },
            'dr': { name: 'DEREGULATE', effect: () => { state.gdp+=0.3; state.inflation-=0.1; state.unemployment-=0.2; state.sp500+=200; state.approval+=1; state.congress-=2; } },
            'ta': { name: 'RAISE TARIFFS', effect: () => { state.tariffRate+=5.0; state.sp500-=250; state.congress+=2; } },
            'ft': { name: 'FREE TRADE', effect: () => { state.tariffRate=Math.max(0, state.tariffRate-5.0); state.sp500+=150; state.gdp+=0.2; } },
            'pc': { name: 'PRICE CONTROLS', effect: () => { state.inflation-=1.5; state.gdp-=1.2; state.sp500-=500; state.unemployment+=0.8; state.hasPriceControls=true; state.congress-=10; } },
            'dn': { name: 'DO NOTHING', effect: () => { state.gdp-=0.1; state.inflation-=0.2; state.sp500+=50; } },
            'ng': { name: 'NEGOTIATE', effect: () => { state.sp500+=400; state.inflation-=1.0; state.approval-=5; state.congress-=8; } },
            'dm': { name: 'DEPLOY MILITARY', effect: () => { triggerWarMode(); } }
        };

        const warCommands = {
            'as': { name: 'AIRSTRIKE', effect: () => { state.war.enemyStrength-=20; state.war.expenditure+=15; state.war.tension+=10; print("GENERAL: Bombs away. Target facilities destroyed.", 'general'); } },
            'bd': { name: 'NAVAL BLOCKADE', effect: () => { state.war.enemyStrength-=10; state.war.tension-=5; state.war.expenditure+=5; state.inflation+=1.0; print("GENERAL: Fleet in position. Nothing gets through. It's squeezing the global supply chain, though.", 'general'); } },
            'go': { name: 'GROUND OPS', effect: () => { state.war.enemyStrength-=35; state.war.casualties+=150; state.war.expenditure+=25; state.war.tension+=20; state.approval-=5; print("GENERAL: Boots on the ground. We are taking territory, but taking fire.", 'general'); } },
            'so': { name: 'SPECIAL OPS', effect: () => { 
                if(Math.random() > 0.4) { state.war.enemyStrength-=15; state.war.expenditure+=2; print("GENERAL: Surgical strike successful. High Value Target eliminated.", 'general'); } 
                else { state.war.casualties+=25; state.war.tension+=15; state.approval-=3; print("GENERAL: Mission compromised! We lost a squad. The press is all over this.", 'danger'); }
            } },
            'es': { name: 'ESCALATE (SURGE)', effect: () => { state.war.enemyStrength-=50; state.war.casualties+=400; state.war.expenditure+=50; state.war.tension+=40; state.approval-=12; print("GENERAL: Massive offensive initiated. Maximum firepower.", 'danger'); } },
            'wd': { name: 'WITHDRAW', effect: () => { endWar(false); } }
        };

        // --- CRISIS SCENARIOS & ADVISOR LOGIC ---
        const crisisProfiles = {
            'inflation': {
                chief: "CHIEF OF STAFF: Mr. President, inflation is killing us in the polls. The press is out for blood. I strongly advise we implement PRICE CONTROLS [pc] to stop corporate gouging immediately!",
                milton: "MILTON: Price controls are a mathematically perfect way to destroy a supply chain. Cap prices below market value, demand skyrockets and supply vanishes. You'll cure high prices with empty supermarket shelves. Restrict the money supply. Raise rates [rr] or cut spending [cs]."
            },
            'unemployment': {
                chief: "CHIEF OF STAFF: Sir, the rust belt is bleeding jobs. Authorize a MASSIVE STIMULUS [ms] or slap TARIFFS [ta] on imports right now!",
                milton: "MILTON: Ah, yes. Buy their love with their own money. Juice the GDP now, but when that printed money chases the same goods next year, inflation will eat us alive. Tariffs just secretly tax 300 million Americans at the register. Deregulate [dr] and let the market clear."
            },
            'market_crash': {
                chief: "CHIEF OF STAFF: The S&P is in freefall! Our mega-donors are losing billions! Get the Fed to CUT RATES [cr] right this second!",
                milton: "MILTON: The infamous 'Fed Put.' The market threw a tantrum because they over-leveraged. If we rescue Wall Street every time they gamble poorly, they will never learn risk management. Moral hazard is real. Let them take the loss. Do nothing [dn]."
            },
            'geopolitical': {
                chief: "CHIEF OF STAFF: Sir, the Strait of Hormuz is blockaded. Oil prices are spiking. We look incredibly weak. The General wants to DEPLOY MILITARY [dm], but we could NEGOTIATE [ng].",
                milton: "MILTON: A diplomatic solution [ng] avoids the massive deadweight loss of a kinetic war. War is the ultimate destroyer of capital. It will cost billions and spike inflation. However, negotiating will make you look weak politically."
            },
            'stable': {
                chief: "CHIEF OF STAFF: Sir, numbers look okay, but we can't afford to look asleep at the wheel. Let's pass a moderate stimulus [ms] to pad our margins.",
                milton: "MILTON: The hardest thing for a politician to do is sit on his hands. The economy is functioning. Do not intervene just to look busy. Doing nothing [dn] is an active, and often the best, policy."
            }
        };

        // --- AUDIO ENGINE ---
        let audioCtx; let clickBuffer;

        function initAudio() {
            if (audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            const bufferSize = audioCtx.sampleRate * 0.05; 
            clickBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = clickBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        }

        function playThump() {
            if (!audioCtx || !state.soundEnabled) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(80, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playClick() {
            if (!audioCtx || !clickBuffer || !state.soundEnabled) return;
            const source = audioCtx.createBufferSource(); source.buffer = clickBuffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 4000;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.015);
            source.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            source.start(); source.stop(audioCtx.currentTime + 0.02);
        }

        function playAlarm() {
            if (!audioCtx || !state.soundEnabled) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'square'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.8);
        }

        function toggleSound() {
            state.soundEnabled = !state.soundEnabled;
            if(state.soundEnabled) { DOM.sLed.classList.add('on'); if(state.isOn) initAudio(); } 
            else { DOM.sLed.classList.remove('on'); }
        }

        // --- SYSTEM LOGIC ---

        function focusTerminal() { if (state.isOn && !DOM.cmd.disabled) DOM.cmd.focus(); }

        function print(text, type = 'system') {
            const div = document.createElement('div');
            div.className = `block ${type}`; div.textContent = text;
            DOM.log.appendChild(div); DOM.log.scrollTop = DOM.log.scrollHeight;
        }

        function renderMacroDashboard() {
            DOM.telemetry.className = 'panel';
            DOM.screen.classList.remove('war-mode');
            DOM.prompt.textContent = "POTUS:~$";
            
            let tLeft = state.maxTurns - state.turn + 1;
            DOM.telemetry.innerHTML = `
                <div class="panel-title">MACRO TELEMETRY</div>
                <div class="metric-row" data-term="election"><span class="metric-label">ELECTION IN:</span><span class="metric-value ${tLeft<=3?'warning':''}">${tLeft} TRN</span></div>
                <div style="height:15px; border-bottom: 1px dashed var(--dim); margin-bottom: 15px;"></div>
                <div class="metric-row" data-term="gdp"><span class="metric-label">GDP GROWTH:</span><span class="metric-value ${state.gdp<1.5?'warning':(state.gdp>3?'good':'')}">${state.gdp.toFixed(1)}%</span></div>
                <div class="metric-row" data-term="unemployment"><span class="metric-label">UNEMPLOYMENT:</span><span class="metric-value ${state.unemployment>6?'warning':(state.unemployment<4?'good':'')}">${state.unemployment.toFixed(1)}%</span></div>
                <div class="metric-row" data-term="inflation"><span class="metric-label">INFLATION(PCE):</span><span class="metric-value ${state.inflation>3?'warning':(state.inflation<2?'good':'')}">${state.inflation.toFixed(1)}%</span></div>
                <div class="metric-row" data-term="sp500"><span class="metric-label">S&P 500:</span><span class="metric-value ${state.sp500<4800?'warning':'good'}">${Math.round(state.sp500).toLocaleString()}</span></div>
                <div style="height:15px;"></div>
                <div class="metric-row" data-term="approval"><span class="metric-label">APP RATING:</span><span class="metric-value">${Math.round(state.approval)}%</span></div>
                <div class="metric-row" data-term="congress"><span class="metric-label">CONGRESS APP:</span><span class="metric-value ${state.congress<=25?'warning':''}">${Math.round(state.congress)}%</span></div>
                <div class="metric-row" data-term="fed"><span class="metric-label">FED CRED:</span><span class="metric-value">${Math.round(state.fedCredibility)}%</span></div>
                <div class="metric-row" data-term="tariffs"><span class="metric-label">AVG TARIFF:</span><span class="metric-value ${state.tariffRate>10?'warning':''}">${state.tariffRate.toFixed(1)}%</span></div>
            `;
            
            DOM.cmdList.innerHTML = `
                <div style="text-align:center; font-weight:bold; border-bottom: 1px solid var(--dim); padding-bottom:5px; margin-bottom:10px;">DIRECTIVES</div>
                <div class="cmd-item highlight" style="text-align:center; margin-bottom: 10px;">[am] ASK MILTON (Advisor)</div>
                <div class="cmd-grid">
                    <div class="cmd-item">[rr] Raise Rates</div><div class="cmd-item">[dr] Deregulate</div>
                    <div class="cmd-item">[cr] Cut Rates</div>  <div class="cmd-item">[ta] Tariffs</div>
                    <div class="cmd-item">[is] Inc Spend</div>  <div class="cmd-item">[ft] Free Trade</div>
                    <div class="cmd-item">[cs] Cut Spend</div>  <div class="cmd-item">[pc] Price Ctrl</div>
                    <div class="cmd-item">[ms] Stimulus</div>   <div class="cmd-item">[dn] Do Nothing</div>
                    ${state.currentCrisis === 'geopolitical' ? '<div class="cmd-item" style="color:var(--danger)">[dm] Deploy Mil</div><div class="cmd-item" style="color:var(--phosphor)">[ng] Negotiate</div>' : ''}
                </div>
            `;
        }

        function renderWarDashboard() {
            DOM.telemetry.className = 'panel war-mode';
            DOM.screen.classList.add('war-mode');
            DOM.prompt.textContent = "COMMAND:~$";

            DOM.telemetry.innerHTML = `
                <div class="panel-title" style="color:var(--danger);">THEATER COMMAND</div>
                <div class="metric-row" data-term="strength"><span class="metric-label">ENEMY STRENGTH:</span><span class="metric-value">${Math.max(0, state.war.enemyStrength)}%</span></div>
                <div class="metric-row" data-term="tension"><span class="metric-label">THEATER TENSION:</span><span class="metric-value ${state.war.tension>80?'warning':''}">${state.war.tension}%</span></div>
                <div class="metric-row" data-term="casualties"><span class="metric-label">CASUALTIES:</span><span class="metric-value warning">${state.war.casualties}</span></div>
                <div class="metric-row" data-term="expenditure"><span class="metric-label">WAR EXPENDITURE:</span><span class="metric-value warning">$${state.war.expenditure}B</span></div>
                <div style="height:15px; border-bottom: 1px dashed var(--danger); margin-bottom: 15px;"></div>
                <div class="metric-row" data-term="approval"><span class="metric-label">DOMESTIC APP:</span><span class="metric-value">${Math.round(state.approval)}%</span></div>
                <div class="metric-row" data-term="inflation"><span class="metric-label">INFLATION:</span><span class="metric-value">${state.inflation.toFixed(1)}%</span></div>
            `;

            DOM.cmdList.innerHTML = `
                <div style="text-align:center; font-weight:bold; border-bottom: 1px solid var(--danger); padding-bottom:5px; margin-bottom:10px; color:var(--danger);">TACTICAL DIRECTIVES</div>
                <div class="cmd-item highlight" style="text-align:center; margin-bottom: 10px; border-color:var(--milton); color:var(--milton);">[am] ASK MILTON (Cost Analysis)</div>
                <div class="cmd-grid">
                    <div class="cmd-item">[as] Airstrike</div>  <div class="cmd-item">[so] Special Ops</div>
                    <div class="cmd-item">[bd] Blockade</div>   <div class="cmd-item">[wd] Withdraw</div>
                    <div class="cmd-item cmd-item war-highlight" style="grid-column: span 2; text-align:center; margin-top:5px;">[es] ESCALATE (Ground Surge)</div>
                </div>
            `;
        }

        function updateDashboard() {
            if (state.mode === 'war') renderWarDashboard();
            else renderMacroDashboard();
        }

        function togglePower() {
            if (state.isOn) return; 
            state.isOn = true;
            if(state.soundEnabled) initAudio();
            playThump();
            
            DOM.pLed.classList.add('on');
            DOM.screen.classList.add('on');
            
            setTimeout(() => {
                print("SYSTEM MILTON BOOT... OK");
                print("AUTHORIZATION: POTUS... CONFIRMED");
                print("--------------------------------------------------");
                print("TUTORIAL:\nYour Chief of Staff advises on political optics. Type [am] to ASK MILTON for structural economic analysis. Actions render instantly.");
                print("--------------------------------------------------\n");
                
                DOM.dash.style.visibility = 'visible';
                runTurn();
            }, 800);
        }

        function triggerWarMode() {
            state.mode = 'war';
            state.war.active = true;
            state.war.enemyStrength = 100;
            state.war.tension = 50;
            state.war.casualties = 0;
            state.war.expenditure = 0;
            
            playAlarm();
            print("\n========================================");
            print("WARNING: KINETIC ACTION AUTHORIZED.", 'danger');
            print("TRANSFERRING TERMINAL TO THEATER COMMAND.", 'system');
            print("========================================\n");
            
            updateDashboard();
            print("GENERAL: Awaiting tactical directives, Commander-in-Chief. We need to reduce Enemy Strength to 0. Watch the tension, if it hits 100% they launch nukes.", 'general');
        }

        function endWar(victory) {
            state.mode = 'macro';
            state.war.active = false;
            
            print("\n========================================");
            print("THEATER COMMAND DISENGAGED.", 'system');
            print("RETURNING TO MACRO TELEMETRY...", 'system');
            print("========================================\n");
            
            if (victory) {
                print("GENERAL: ENEMY SURRENDER CONFIRMED. TOTAL VICTORY.", 'general');
                print("CHIEF OF STAFF: You're a hero, sir! Approval is through the roof!", 'chief');
                state.approval += 25;
            } else {
                print("GENERAL: WITHDRAWAL COMPLETE. We are tucking tail.", 'general');
                print("CHIEF OF STAFF: The press is calling it a humiliating defeat. We are bleeding polls.", 'chief');
                state.approval -= 20;
            }

            // Economic consequences hit the macro board immediately
            print(`MILTON: The war is over. Time to pay the bill. Total expenditure: $${state.war.expenditure} Billion. This deficit spending will now hit the macro economy.`, 'milton');
            let infHit = (state.war.expenditure / 10);
            let gdpHit = (state.war.expenditure / 20);
            state.inflation += infHit;
            state.gdp -= gdpHit;
            
            state.turn++;
            updateDashboard();
            setTimeout(runTurn, 1000);
        }

        function determineCrisis() {
            if (state.turn === 4) return 'geopolitical'; // Hardcode Turn 4 as war trigger
            if (state.inflation > 4.5) return 'inflation';
            if (state.unemployment > 6.0) return 'unemployment';
            if (state.sp500 < 4500) return 'market_crash';
            if (state.approval < 45) return 'approval_drop';
            return 'stable';
        }

        function runTurn() {
            if (state.mode === 'war') return; // Handled dynamically
            
            state.miltonAskedThisTurn = false;
            state.currentCrisis = determineCrisis();
            
            updateDashboard();
            print(`--- TURN ${state.turn} ---`);
            
            if (state.currentCrisis === 'geopolitical') {
                playAlarm();
                print("SYSTEM: GLOBAL OIL SHOCK. STRAIT OF HORMUZ BLOCKADED BY HOSTILE ACTORS.", 'danger');
            }
            
            print(crisisProfiles[state.currentCrisis].chief, 'chief');
            
            DOM.inputLine.style.display = 'flex';
            DOM.cmd.disabled = false;
            focusTerminal();
        }

        function processInput() {
            let val = DOM.cmd.value.trim().toLowerCase();
            DOM.cmd.value = ''; DOM.visInput.textContent = '';
            if (!val) return;

            // --- ASK MILTON LOGIC ---
            if (val === 'am' || val === 'ask milton') {
                if (state.mode === 'war') {
                    print(`COMMAND:~$ ASK MILTON`, 'user-echo');
                    print("MILTON: Airstrikes cost $15B. Blockades spike global inflation. Ground ops cost $25B and cause casualties, which hurts approval. Do not bankrupt the country for a sandbox war.", 'milton');
                    return;
                } else {
                    if (state.miltonAskedThisTurn) {
                        print(`POTUS:~$ ${val}`, 'user-echo');
                        print("MILTON: I already gave you my analysis, boss. The ball is in your court.", 'milton');
                        return;
                    }
                    print(`POTUS:~$ ASK MILTON`, 'user-echo');
                    print(crisisProfiles[state.currentCrisis].milton, 'milton');
                    state.miltonAskedThisTurn = true;
                    return; 
                }
            }

            // Determine Command Dictionary based on Mode
            let dict = state.mode === 'war' ? warCommands : macroCommands;
            let cmdObj = dict[val];
            
            if (!cmdObj) {
                for (let key in dict) {
                    if (dict[key].name.toLowerCase() === val) { cmdObj = dict[key]; val = key; break; }
                }
            }

            if (!cmdObj) {
                print(`${state.mode === 'war' ? 'COMMAND:~$' : 'POTUS:~$'} ${val}`, 'user-echo');
                print("ERROR: UNRECOGNIZED DIRECTIVE.", 'danger');
                return;
            }

            DOM.inputLine.style.display = 'none';
            DOM.cmd.disabled = true;
            print(`${state.mode === 'war' ? 'COMMAND:~$' : 'POTUS:~$'} EXECUTE: ${cmdObj.name}`, 'user-echo');
            
            // Execute Effect
            cmdObj.effect();
            
            // --- WAR LOOP RESOLUTION ---
            if (state.mode === 'war') {
                if (val !== 'wd') {
                    // Enemy retaliation
                    if (state.war.enemyStrength > 0) {
                        state.war.casualties += Math.floor(Math.random() * 20);
                        state.approval -= 1; // slow bleed
                    }
                    updateDashboard();

                    if (state.war.tension >= 100) {
                        print("SYSTEM: TENSION CRITICAL. ENEMY STRATEGIC LAUNCH DETECTED.", 'danger');
                        print("GENERAL: MAY GOD HAVE MERCY ON US ALL.", 'general');
                        setTimeout(() => {
                            DOM.screen.style.backgroundColor = '#fff';
                            DOM.screen.innerHTML = '<div style="color:black; font-size:40px; font-weight:bold; margin:auto;">MUTUALLY ASSURED DESTRUCTION</div>';
                        }, 2000);
                        return;
                    }

                    if (state.war.enemyStrength <= 0) {
                        setTimeout(() => endWar(true), 1000);
                        return;
                    }

                    if (state.approval <= 15) {
                        print("SYSTEM: WAR PROTESTS OVERWHELM CAPITAL. CONGRESS VOTES IMPEACHMENT.", 'danger');
                        return;
                    }

                    setTimeout(() => {
                        DOM.inputLine.style.display = 'flex';
                        DOM.cmd.disabled = false;
                        focusTerminal();
                    }, 500);
                }
                return;
            }

            // --- MACRO LOOP RESOLUTION ---
            if (val !== 'pc') state.hasPriceControls = false;

            if (state.tariffRate > 0) {
                let drag = state.tariffRate * 0.05;
                state.inflation += drag; state.gdp -= (drag * 0.5);
            }

            let drift = 0;
            if (state.inflation > 3.0) drift -= (state.inflation - 3.0) * 1.5;
            if (state.unemployment > 5.0) drift -= (state.unemployment - 5.0) * 1.5;
            if (state.gdp < 1.0) drift -= 2;
            if (state.inflation <= 2.5) drift += 2.5;
            if (state.unemployment <= 4.5) drift += 2.0;
            if (state.gdp >= 3.0) drift += 2.0;
            if (state.sp500 >= 5200) drift += 1.5;
            
            state.approval += drift;

            state.gdp = Math.max(-15, state.gdp);
            state.unemployment = Math.min(35, Math.max(2, state.unemployment));
            state.inflation = Math.max(-3, state.inflation);
            state.approval = Math.min(100, Math.max(0, state.approval));
            state.congress = Math.min(100, Math.max(0, state.congress));
            state.fedCredibility = Math.min(100, Math.max(0, state.fedCredibility));
            state.sp500 = Math.max(500, state.sp500);

            if (drift >= 4) print(`SYSTEM: Macro stabilization noted by electorate. Approval +${drift.toFixed(1)}%`);
            if (drift <= -4) print(`SYSTEM: Macro distress penalizing incumbent. Approval ${drift.toFixed(1)}%`, 'danger');

            updateDashboard();

            if (state.congress <= 15) {
                print("\nSYSTEM: IMPEACHMENT PASSED. EXECUTIVE REMOVED.", 'danger');
                print("CHIEF OF STAFF: Pack your bags, sir. We're done.", 'chief');
                return;
            }

            state.turn++;
            
            if (state.turn > state.maxTurns) {
                print("\n--- ELECTION DAY ---");
                if (state.inflation > 5 || state.unemployment > 8) {
                    print("CHIEF OF STAFF: It's a blowout. The voters blamed us. We lost.", 'chief');
                    print("MILTON: As expected. You ignored the monetary fundamentals, and the market extracted its toll.", 'milton');
                } else if (state.approval < 40) {
                    print("CHIEF OF STAFF: We lost re-election. The optics were just too terrible.", 'chief');
                    print("MILTON: True, but you took the necessary short-term hits and set up the foundation for the future. A thankless job.", 'milton');
                } else {
                    print("CHIEF OF STAFF: WE WON! Four more years!", 'chief');
                    print("MILTON: Congratulations, Mr. President. We maintained relatively free markets and stable money. A rare victory for structural restraint.", 'milton');
                }
                return;
            }

            if (state.mode === 'macro') {
                setTimeout(() => {
                    print("\n");
                    runTurn();
                }, 500);
            }
        }

        // --- EVENTS ---
        DOM.cmd.addEventListener('input', (e) => { DOM.visInput.textContent = e.target.value.toLowerCase(); });
        DOM.cmd.addEventListener('keydown', (e) => {
            if (e.key.length === 1 || e.key === 'Backspace') playClick();
            if (e.key === 'Enter') processInput();
        });
        DOM.cmd.addEventListener('blur', () => {
            if (state.isOn && !DOM.cmd.disabled) setTimeout(() => DOM.cmd.focus(), 10);
        });

        document.querySelectorAll('.hover-term').forEach(el => {
            el.addEventListener('mouseover', (e) => {
                const data = contextDict[e.target.dataset.term];
                if(data) {
                    DOM.dict.innerHTML = `
                        <div class="context-title">${data.title}</div>
                        <div class="context-def">${data.def}</div>
                        <div class="context-hist">PRECEDENT: ${data.hist}</div>
                    `;
                }
            });
            el.addEventListener('mouseout', () => {
                DOM.dict.innerHTML = `
                    <div class="context-title">ECONOMIC INTELLIGENCE</div>
                    <div class="context-def">Hover over metrics to access structural definitions and behavioral precedents.</div>
                `;
            });
        });

    </script>
</body>
</html>
