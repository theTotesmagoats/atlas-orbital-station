<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESIDENTIAL TERMINAL - MILTON v15.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        :root {
            --phosphor: #ffb000; 
            --milton: #e8e8e8;   
            --bg: #0a0600;
            --dim: rgba(255, 176, 0, 0.2);
            --danger: #ff3300;
            --good: #4af626;
            --war: #ff4444;
            --dark: #b366ff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000; font-family: 'VT323', monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; padding: 2vh 2vw; overflow: hidden;
            font-size: 22px; color: var(--phosphor); letter-spacing: 1px;
        }

        .hardware-bezel {
            width: 100%; max-width: 1600px; height: 100%;
            background: #111; border-radius: 12px;
            padding: 20px 20px 90px 20px; 
            box-shadow: inset 0 0 20px #000, 0 0 50px #000;
            display: flex; flex-direction: column; position: relative;
        }

        .crt-screen {
            background: var(--bg); flex-grow: 1; border-radius: 8px;
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            opacity: 0; transition: opacity 0.1s, background-color 0.5s;
        }
        .crt-screen.on { opacity: 1; }
        .crt-screen.war-mode { background: #1a0500; } 
        .crt-screen.dark-mode { background: #0d001a; } 

        .scanlines {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px; pointer-events: none; z-index: 50;
        }
        
        .glow {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(255,176,0,0.02) 0%, rgba(0,0,0,0.3) 100%);
            pointer-events: none; z-index: 49;
        }

        .ticker-bar {
            display: flex; background: rgba(255, 176, 0, 0.08);
            border-bottom: 2px solid var(--dim); height: 35px;
            align-items: center; flex-shrink: 0; z-index: 20; position: relative; visibility: hidden;
        }
        .ticker-label {
            background: var(--phosphor); color: #000; font-weight: bold;
            padding: 0 15px; height: 100%; display: flex; align-items: center;
            z-index: 21; box-shadow: 2px 0 10px rgba(0,0,0,0.8);
        }
        .ticker-viewport { flex-grow: 1; overflow: hidden; position: relative; height: 100%; }
        .ticker-scroll {
            position: absolute; white-space: nowrap; line-height: 35px;
            animation: scroll 25s linear infinite; font-size: 20px;
        }
        @keyframes scroll { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        .system-grid {
            display: grid; grid-template-columns: 1fr 430px; 
            flex-grow: 1; position: relative; z-index: 10; overflow: hidden; 
        }

        .terminal-area {
            display: flex; flex-direction: column; padding: 20px 30px 10px 30px; 
            height: 100%; border-right: 2px solid var(--dim); cursor: text; overflow: hidden;
        }

        #artilleryCanvas {
            width: 100%; height: 250px; flex-shrink: 0;
            background: rgba(255, 68, 68, 0.05);
            border: 1px solid var(--war); border-radius: 4px;
            margin-bottom: 15px; display: none;
            box-shadow: inset 0 0 15px rgba(255, 68, 68, 0.2);
        }

        .log-output {
            flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column;
            justify-content: flex-start; padding-bottom: 15px;
        }
        .log-output::-webkit-scrollbar { display: none; }

        .block { margin-bottom: 15px; line-height: 1.3; text-shadow: none; }
        .block.system { opacity: 0.8; }
        .block.chief { font-weight: bold; color: var(--phosphor); border-left: 3px solid var(--phosphor); padding-left: 15px; }
        .block.milton { color: var(--milton); font-size: 20px; border-left: 3px solid var(--milton); padding-left: 15px; opacity: 0.95; }
        .block.danger { color: var(--danger); font-weight: bold; }
        .block.general { color: var(--war); border-left: 3px solid var(--war); padding-left: 15px; font-weight: bold; }
        .block.dark { color: var(--dark); border-left: 3px solid var(--dark); padding-left: 15px; font-weight: bold; }
        .block.user-echo { font-weight: bold; opacity: 0.9; }

        .input-line {
            display: flex; align-items: center; margin-top: auto;
            flex-shrink: 0; display: none; padding-bottom: 8px; font-size: 24px;
        }
        .prompt { margin-right: 10px; font-weight: bold; }
        #visualInput { white-space: pre; text-transform: lowercase; }
        .cursor {
            display: inline-block; width: 14px; height: 24px; background: var(--phosphor); 
            animation: blink 1s step-end infinite; margin-left: 2px; vertical-align: text-bottom;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        #cmd { position: absolute; opacity: 0; left: -9999px; top: -9999px; pointer-events: none; }

        .dashboard-area {
            padding: 20px; display: flex; flex-direction: column; gap: 12px; 
            background: rgba(10, 6, 0, 0.4); cursor: default; height: 100%; overflow: hidden; visibility: hidden;
        }

        .panel {
            border: 2px solid var(--phosphor); padding: 10px 15px;
            box-shadow: inset 0 0 10px var(--dim); transition: border-color 0.3s; flex-shrink: 0; 
        }
        .panel.war-mode { border-color: var(--war); }
        .panel.dark-mode { border-color: var(--dark); }

        .panel-title { text-align: center; border-bottom: 2px solid var(--dim); padding-bottom: 5px; margin-bottom: 8px; letter-spacing: 2px; font-weight: bold; }
        .metric-header { display: grid; grid-template-columns: 1fr 80px 80px; font-size: 16px; opacity: 0.6; margin-bottom: 5px; text-align: right; border-bottom: 1px solid var(--dim); padding-bottom: 2px; }
        .metric-row { display: grid; grid-template-columns: 1fr 80px 80px; align-items: center; margin-bottom: 6px; cursor: help; }
        .metric-row:hover { background: var(--dim); }
        .metric-label { opacity: 0.8; }
        .metric-value { font-weight: bold; text-align: right; transition: color 0.3s;}
        .metric-target { opacity: 0.5; color: var(--phosphor); text-align: right; font-size: 20px; }
        .metric-value.warning { color: var(--danger); }
        .metric-value.good { color: var(--good); }

        .dict-box {
            flex-grow: 1; border: 1px solid var(--dim); padding: 15px; font-size: 18px; line-height: 1.3; 
            background: rgba(255, 176, 0, 0.05); display: flex; flex-direction: column; overflow-y: auto; min-height: 80px; 
        }
        .dict-box::-webkit-scrollbar { display: none; }
        .context-title { font-weight: bold; font-size: 20px; margin-bottom: 6px; border-bottom: 1px solid var(--phosphor); padding-bottom: 4px; flex-shrink: 0; }
        .context-hist { font-style: italic; opacity: 0.9; border-left: 2px solid var(--phosphor); padding-left: 10px; color: var(--milton); }

        .cmd-list { flex-shrink: 0; font-size: 18px; opacity: 0.9; border-top: 2px dashed var(--dim); padding-top: 10px; padding-bottom: 5px; }
        .cmd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px; }
        .cmd-item { font-size: 18px; }
        .cmd-item.highlight { border: 1px solid var(--milton); color: var(--milton); padding: 2px 4px; border-radius: 3px; text-align: center; margin-bottom: 8px;}

        .hardware-controls { position: absolute; bottom: 22px; right: 35px; display: flex; gap: 25px; z-index: 100; }
        .hw-btn {
            width: 48px; height: 48px; background: #2a2a2a; border: 2px solid #000; border-radius: 50%;
            cursor: pointer; box-shadow: 0 4px 0 #000, inset 0 2px 5px rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; color: #111; 
            transition: all 0.1s; position: relative;
        }
        .hw-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #000; }
        .hw-led { width: 9px; height: 9px; border-radius: 50%; position: absolute; top: -17px; left: 18px; background: #331a00; }
        .hw-led.on { background: #ffaa00; box-shadow: 0 0 10px #ffaa00; }
        .hw-led.green.on { background: #4af626; box-shadow: 0 0 10px #4af626; }
    </style>
</head>
<body>

    <div class="hardware-bezel">
        <div class="crt-screen" id="screen">
            <div class="scanlines"></div><div class="glow"></div>
            
            <div class="ticker-bar" id="tickerBar">
                <div class="ticker-label">NEWSWIRE</div>
                <div class="ticker-viewport">
                    <div class="ticker-scroll" id="tickerContent">AWAITING SYSTEM BOOT...</div>
                </div>
            </div>

            <div class="system-grid">
                <div class="terminal-area" onclick="focusTerminal()">
                    <canvas id="artilleryCanvas"></canvas>
                    <div class="log-output" id="logOutput"></div>
                    <div class="input-line" id="inputLine">
                        <span class="prompt" id="promptText">POTUS:~$</span>
                        <span id="visualInput"></span><div class="cursor" id="cursorIndicator"></div>
                        <input type="text" id="cmd" autocomplete="off" spellcheck="false" maxlength="60">
                    </div>
                </div>

                <div class="dashboard-area" id="dashboardArea">
                    <div class="panel" id="telemetryPanel"></div>
                    <div class="dict-box" id="dictBox">
                        <div class="context-title" id="dictTitle">INTELLIGENCE</div>
                        <div class="context-def" id="dictDef">Hover over metrics to access definitions.</div>
                        <div class="context-hist" id="dictHist" style="display:none;"></div>
                    </div>
                    <div class="cmd-list" id="cmdListArea"></div>
                </div>
            </div>
        </div>

        <div class="hardware-controls">
            <div class="hw-btn" onclick="toggleSound()"><div class="hw-led green on" id="soundLed"></div>🔊</div>
            <div class="hw-btn" onclick="togglePower()"><div class="hw-led" id="powerLed"></div>⏻</div>
        </div>
    </div>

    <script>
        const state = {
            isOn: false, soundEnabled: true,
            mode: 'init', subMode: null, turn: 0, monthsToElection: 48,
            gdp: 2.1, unemployment: 5.1, inflation: 4.8, approval: 48, fedRate: 5.25, fedCred: 80, sp500: 4800, congress: 55, tariff: 0,
            war: { enemyStrength: 100, tension: 50, casualties: 0, expenditure: 0 },
            dark: { narrative: 45, compliance: 50, paranoia: 25, trust: 75 },
            newsQueue: [], futureNews: [] 
        };

        const DOM = {
            screen: document.getElementById('screen'), pLed: document.getElementById('powerLed'), sLed: document.getElementById('soundLed'),
            log: document.getElementById('logOutput'), inputLine: document.getElementById('inputLine'), cmd: document.getElementById('cmd'),
            visInput: document.getElementById('visualInput'), dash: document.getElementById('dashboardArea'),
            telemetry: document.getElementById('telemetryPanel'), cmdList: document.getElementById('cmdListArea'),
            dict: document.getElementById('dictBox'), dictTitle: document.getElementById('dictTitle'), dictDef: document.getElementById('dictDef'), dictHist: document.getElementById('dictHist'),
            prompt: document.getElementById('promptText'), tickerBar: document.getElementById('tickerBar'), tickerContent: document.getElementById('tickerContent'),
            canvas: document.getElementById('artilleryCanvas')
        };

        // --- AUDIO ---
        let audioCtx; let clickBuffer; let humOscillator;
        function initAudio() {
            if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                clickBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
                const data = clickBuffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            } catch (e) { state.soundEnabled = false; DOM.sLed.classList.remove('on'); }
        }
        function playHum() {
            if (!audioCtx || !state.soundEnabled || humOscillator) return;
            humOscillator = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
            humOscillator.type = 'sine'; humOscillator.frequency.value = 60; gainNode.gain.value = 0.01;
            humOscillator.connect(gainNode); gainNode.connect(audioCtx.destination); humOscillator.start();
        }
        function stopHum() { if (humOscillator) { humOscillator.stop(); humOscillator.disconnect(); humOscillator = null; } }
        function playBell(isDark = false) {
            if (!audioCtx || !state.soundEnabled) return;
            const t = audioCtx.currentTime;
            const ping = (time) => {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = isDark ? 'square' : 'sine'; osc.frequency.setValueAtTime(isDark ? 600 : 1200, time);
                osc.frequency.exponentialRampToValueAtTime(isDark ? 400 : 800, time + 0.1);
                gain.gain.setValueAtTime(0.4, time); gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(time); osc.stop(time + 0.15);
            };
            ping(t); ping(t + 0.12);
        }

        // --- COMMANDS ---
        const macroCommands = {
            'rr': { shortcut: 'rr', name: 'RAISE RATES', effect: () => { state.fedRate += 0.75; state.inflation -= 0.6; state.sp500 -= 300; state.gdp -= 0.4; } },
            'cr': { shortcut: 'cr', name: 'CUT RATES', effect: () => { state.fedRate = Math.max(0, state.fedRate - 0.75); state.inflation += 0.5; state.sp500 += 400; } },
            'cs': { shortcut: 'cs', name: 'CUT SPENDING', effect: () => { state.inflation -= 0.5; state.gdp -= 0.3; state.approval -= 4; state.congress -= 5; } },
            'is': { shortcut: 'is', name: 'INC SPENDING', effect: () => { state.gdp += 0.4; state.inflation += 0.6; state.approval += 3; state.congress += 6; } },
            'dr': { shortcut: 'dr', name: 'DEREGULATE', effect: () => { state.gdp += 0.5; state.unemployment -= 0.3; state.sp500 += 200; } },
            'ft': { shortcut: 'ft', name: 'FREE TRADE', effect: () => { state.tariff = Math.max(0, state.tariff - 5); state.gdp += 0.3; state.inflation -= 0.2; } },
            'ta': { shortcut: 'ta', name: 'RAISE TARIFFS', effect: () => { state.tariff += 5; state.inflation += 0.6; state.sp500 -= 200; state.approval += 2; } },
            'pc': { shortcut: 'pc', name: 'PRICE CONTROLS', effect: () => { state.hasPriceControls = true; state.inflation -= 1.5; state.gdp -= 1.2; state.unemployment += 0.8; state.congress -= 8; } },
            'qe': { shortcut: 'qe', name: 'QUANT EASE', effect: () => { state.sp500 += 600; state.inflation += 2.0; state.fedCred -= 15; } },
            'tx': { shortcut: 'tx', name: 'RAISE TAXES', effect: () => { state.gdp -= 0.7; state.inflation -= 0.4; state.approval -= 6; } },
            'dm': { shortcut: 'dm', name: 'DEPLOY MILITARY', effect: () => { state.mode = 'war'; triggerWarMode(); } },
            'do': { shortcut: 'do', name: 'DARK OPS', effect: () => { state.mode = 'dark'; triggerDarkMode(); } },
            'am': { shortcut: 'am', name: 'ASK MILTON', effect: () => { state.miltonAsked = true; } },
            'dn': { shortcut: 'dn', name: 'DO NOTHING', effect: () => { state.gdp -= 0.1; } }
        };

        const warCommands = {
            'as': { shortcut: 'as', name: 'ARTILLERY STRIKE', effect: () => { initArtilleryMode(); } },
            'wd': { shortcut: 'wd', name: 'WITHDRAW', effect: () => { endWar(false); } }
        };

        const darkCommands = {
            'ff': { shortcut: 'ff', name: 'FEAR CAMPAIGN', effect: () => { state.dark.narrative += 15; state.dark.paranoia += 20; state.approval += 10; state.dark.trust -= 15; } },
            'sm': { shortcut: 'sm', name: 'SUBSIDIZE MEDIA', effect: () => { state.dark.compliance += 25; state.gdp -= 0.4; } },
            'ex': { shortcut: 'ex', name: 'EXIT OPS', effect: () => { endDarkOps(); } }
        };

        // --- CRISIS DIALOGUE ---
        const crisisProfiles = {
            'inflation': { 
                chief: "CHIEF OF STAFF: Sir, inflation is out of control. We need PRICE CONTROLS [pc] now. It shows we're fighting corporate greed and it'll fix our poll numbers overnight.", 
                milton: "MILTON: Price controls convert a monetary problem into a supply problem. You'll get the vote today and empty shelves tomorrow. To fix this, you must stop the printing presses. RAISE RATES [rr] or CUT SPENDING [cs]." 
            },
            'unemployment': { 
                chief: "CHIEF OF STAFF: The labor market is freezing up. We need a MASSIVE STIMULUS [is] or TARIFFS [ta] to protect jobs. We can't let the voters see those unemployment lines.", 
                milton: "MILTON: The Chief wants to buy jobs with stolen purchasing power. Stimulus is a sugar high followed by a heart attack. DEREGULATE [dr] and let the market find the natural rate of labor." 
            }
        };

        // --- TICKER & DASHBOARD ---
        function queueNews(msg, delay) { if (delay === 0) state.newsQueue.push(msg); else state.futureNews.push({ turn: state.turn + delay, msg }); }
        
        function processTicker() {
            state.futureNews = state.futureNews.filter(e => { if (e.turn <= state.turn) { state.newsQueue.push(e.msg); return false; } return true; });
            let news = state.newsQueue.length ? state.newsQueue : ["[SYSTEM] ALL METRICS NOMINAL."];
            DOM.tickerContent.innerHTML = news.join(" &nbsp;&nbsp; // &nbsp;&nbsp; ");
            DOM.tickerContent.style.animation = 'none'; void DOM.tickerContent.offsetWidth; DOM.tickerContent.style.animation = null;
            state.newsQueue = [];
        }

        function updateDashboard() {
            const gdpClass = state.gdp >= 3 ? 'good' : (state.gdp < 1 ? 'warning' : '');
            const infClass = state.inflation <= 2.5 ? 'good' : (state.inflation > 5 ? 'warning' : '');
            DOM.telemetry.innerHTML = `
                <div class="panel-title">MACRO TELEMETRY</div>
                <div class="metric-header"><span>METRIC</span><span>ACTUAL</span><span>TGT</span></div>
                <div class="metric-row" onmouseover="setDict('gdp')"><span class="metric-label">GDP GROWTH:</span><span class="metric-value ${gdpClass}">${state.gdp}%</span><span class="metric-target">3.0%</span></div>
                <div class="metric-row" onmouseover="setDict('inflation')"><span class="metric-label">INFLATION:</span><span class="metric-value ${infClass}">${state.inflation}%</span><span class="metric-target">2.0%</span></div>
                <div class="metric-row" onmouseover="setDict('fedRate')"><span class="metric-label">INT RATE:</span><span class="metric-value">${state.fedRate}%</span><span class="metric-target">--</span></div>
                <div class="metric-row" onmouseover="setDict('sp500')"><span class="metric-label">S&P 500:</span><span class="metric-value">${Math.round(state.sp500)}</span><span class="metric-target">5200</span></div>
                <div style="height:10px"></div>
                <div class="metric-row" onmouseover="setDict('approval')"><span class="metric-label">APPROVAL:</span><span class="metric-value">${Math.round(state.approval)}%</span><span class="metric-target">51%</span></div>
            `;
            DOM.cmdList.innerHTML = `
                <div class="cmd-grid">
                    <div>[rr] Raise Rate</div><div>[cs] Cut Spend</div>
                    <div>[cr] Cut Rate</div><div>[is] Inc Spend</div>
                    <div>[tx] Raise Tax</div><div>[dr] Dereg</div>
                </div>
                <div class="cmd-item highlight" style="margin-top:8px" onclick="DOM.cmd.value='am';processInput()">[am] ASK MILTON</div>
            `;
            DOM.dash.style.visibility = 'visible'; DOM.tickerBar.style.visibility = 'visible';
        }

        function setDict(key) {
            const d = contextDict[key] || {title:"-", def:"-"};
            DOM.dictTitle.textContent = d.title; DOM.dictDef.textContent = d.def;
        }

        // --- SYSTEM ENGINE ---
        function togglePower() {
            if (state.isOn) { location.reload(); return; }
            state.isOn = true; DOM.pLed.classList.add('on'); DOM.screen.classList.add('on');
            initAudio(); playHum(); playBell();
            setTimeout(startBriefing, 800);
        }

        function startBriefing() {
            state.mode = 'init';
            state.gdp = (Math.random() * 4 - 1).toFixed(1);
            state.inflation = (Math.random() * 6 + 2).toFixed(1);
            state.unemployment = (Math.random() * 3 + 4).toFixed(1);
            print("INCOMING BRIEFING: THE PREDECESSOR'S LEGACY");
            print("--------------------------------------------------");
            print(`Your election victory is absolute, but the economy is not.\nYou have inherited ${state.inflation}% inflation and stalling ${state.gdp}% growth.`);
            print(`The Fed rate is currently ${state.fedRate}%. Wall Street is nervous.`);
            print("--------------------------------------------------");
            print("FIRST ACTION: ENTER INITIAL POLICY PACKAGE (e.g., rr, cs, dr)");
            DOM.inputLine.style.display = 'flex'; focusTerminal();
        }

        function advanceTimeline() {
            state.turn++; state.monthsToElection -= 4;
            if (state.monthsToElection <= 0) { print("ELECTION DAY: GAME OVER."); return; }
            
            // Monetary Gravity
            if (state.fedRate > 6) { state.gdp -= 0.2; state.sp500 -= 50; }
            if (state.inflation < 2.5 && state.unemployment < 5) state.gdp += 0.2;

            updateDashboard(); processTicker();
            print(`\n--- MONTH ${48 - state.monthsToElection} ---`);
            const crisis = crisisProfiles['inflation'];
            print(crisis.chief, 'chief');
            enableInput();
        }

        function processInput() {
            const raw = DOM.cmd.value.toLowerCase().trim();
            DOM.cmd.value = ''; DOM.visInput.textContent = '';
            if (!raw) return;

            if (raw === 'am' || raw === 'ask milton') {
                print("POTUS:~$ ASK MILTON", 'user-echo');
                print(crisisProfiles['inflation'].milton, 'milton');
                enableInput(); return;
            }

            const tokens = raw.split(/[\s,]+/).filter(t => macroCommands[t]);
            tokens.forEach(t => macroCommands[t].effect());
            
            if (state.mode === 'init') { state.mode = 'macro'; print("POLICY INITIALIZED."); }
            DOM.inputLine.style.display = 'none';
            setTimeout(advanceTimeline, 800);
        }

        function focusTerminal() { DOM.cmd.focus(); }
        DOM.cmd.addEventListener('input', (e) => { DOM.visInput.textContent = e.target.value; });
        DOM.cmd.addEventListener('keydown', (e) => { if (e.key === 'Enter') processInput(); });
    </script>
</body>
</html>
